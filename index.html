<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pico — Download</title>
  <style>
    :root {
      --bg: #d7bea2;
      --text: #2e1c11;
      --muted: rgba(46, 28, 17, 0.68);
      --glass-bg: rgba(255, 255, 255, 0.34);
      --glass-border: rgba(255, 255, 255, 0.68);
      --btn-bg: rgba(255, 255, 255, 0.54);
      --btn-border: rgba(255, 255, 255, 0.88);
      --btn-hover: rgba(255, 255, 255, 0.72);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 16%, rgba(255,255,255,0.42), transparent 40%),
        radial-gradient(circle at 15% 86%, rgba(190,150,108,0.22), transparent 45%),
        radial-gradient(circle at 85% 88%, rgba(173,129,90,0.24), transparent 43%),
        linear-gradient(180deg, #dfc8ac, #d7bea2 60%, #cfb18f 100%);
      background-color: var(--bg);
    }

    body { position: relative; }

    .hero {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
      padding-bottom: 146px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3.2vw, 3.05rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .tagline {
      margin: 8px 0 0;
      font-size: clamp(1rem, 1.95vw, 2rem);
      color: rgba(46, 28, 17, 0.74);
    }

    .liquid-glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(24px) saturate(180%) brightness(1.08);
      position: relative;
      isolation: isolate;
    }

    .liquid-glass::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.85),
        inset 0 -1px 0 rgba(255,255,255,0.18),
        inset 1px 0 0 rgba(255,255,255,0.22),
        inset -1px 0 0 rgba(255,255,255,0.14);
    }

    .feature-pill {
      margin-top: 24px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 14px;
    }

    .mode-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(46, 28, 17, 0.72);
      pointer-events: none;
    }

    .mode-btn svg,
    .download-link svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .downloads {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: min(820px, calc(100vw - 20px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .downloads-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    .download-row {
      width: 100%;
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .download-link {
      flex: 1;
      min-width: 160px;
      max-width: 240px;
      border-radius: 12px;
      padding: 10px 16px;
      text-decoration: none;
      color: var(--text);
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.9rem;
      font-weight: 650;
      transition: transform 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .download-link:hover {
      transform: translateY(-1px);
      background: var(--btn-hover);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.94), inset 0 -1px 0 rgba(255,255,255,0.2);
    }

    .download-link > span { font-size: 0.56em; }

    @media (max-width: 760px) {
      .hero { padding-bottom: 208px; }
      .download-row { flex-wrap: wrap; }
      .download-link {
        min-width: 100%;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="pico hero">
    <h1>pico</h1>
    <p class="tagline">Fast captures. Clean marks. Zero friction.</p>

    <div class="feature-pill liquid-glass" aria-label="Capture modes">
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V4h4"/><path d="M4 16v4h4"/><path d="M16 4h4v4"/><path d="M16 20h4v-4"/><rect x="8" y="8" width="8" height="8" rx="1" stroke-dasharray="2 2"/></svg>
      </span>
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 8h18"/><circle cx="5.5" cy="6" r=".5" fill="currentColor"/><circle cx="7.5" cy="6" r=".5" fill="currentColor"/><circle cx="9.5" cy="6" r=".5" fill="currentColor"/></svg>
      </span>
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M6 21h12"/><path d="M12 17v4"/></svg>
      </span>
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="13" height="14" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>
      </span>
    </div>
  </main>

  <section class="downloads" aria-label="Download options">
    <p class="downloads-label">DOWNLOAD</p>
    <div class="download-row">
      <a class="download-link" href="#" aria-label="Download for macOS">
        <svg viewBox="0 0 814 1000" aria-hidden="true"><path fill="currentColor" d="M788 777c-16 37-35 72-59 107-33 49-60 83-81 103-33 34-69 52-108 55-28 0-61-8-100-24-39-16-75-24-108-24-34 0-71 8-112 24-41 16-74 25-99 25-37 2-74-17-109-56-22-21-51-57-86-108-37-55-68-119-92-192-25-77-37-152-37-225 0-84 18-156 54-216 28-49 66-88 113-116 47-28 98-43 153-44 30 0 69 9 117 27 47 18 77 27 90 27 10 0 43-10 98-31 52-19 96-27 132-24 98 8 171 46 220 114-88 53-132 126-131 219 1 72 27 132 79 180 23 23 49 41 77 55-6 17-12 33-19 49zM550 43c0 57-21 110-62 159-50 58-111 91-178 86-1-7-1-14-1-21 0-54 23-111 65-157 21-24 48-43 80-58 32-14 62-22 91-24 3 5 5 10 5 15z"/></svg>

      <a class="download-link" href="#" aria-label="Download for Windows">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="3" width="9" height="8" fill="#F25022"/><rect x="13" y="3" width="9" height="8" fill="#7FBA00"/><rect x="2" y="13" width="9" height="8" fill="#00A4EF"/><rect x="13" y="13" width="9" height="8" fill="#FFB900"/></svg>

        <span>Linux</span>
      </a>
    </div>
  </section>
</body>
</html>
