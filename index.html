<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="pico: lightweight capture app for macOS and Windows." />
  <title>pico · Download</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <style>
    :root {
      --bg: #07080c;
      --text: #f8f8f8;
      --muted: rgba(248, 248, 248, 0.7);
      --glass: rgba(255, 255, 255, 0.14);
      --glass-border: rgba(255, 255, 255, 0.32);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
      --accent: #ffb36a;
    }

    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 179, 106, 0.16), transparent 42%),
        radial-gradient(circle at 20% 80%, rgba(124, 180, 255, 0.09), transparent 38%),
        radial-gradient(circle at 80% 85%, rgba(145, 120, 255, 0.08), transparent 40%),
        var(--bg);
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }

    .hero {
      height: 100vh;
      width: min(960px, 92vw);
      display: grid;
      place-items: center;
      text-align: center;
      padding-bottom: 120px;
    }

    .mascot {
      width: clamp(180px, 28vw, 290px);
      height: auto;
      filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.45));
      animation: hover 5.4s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    h1 {
      margin-top: 24px;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: 0.02em;
      font-weight: 600;
    }

    p {
      margin-top: 12px;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.5vw, 1.05rem);
    }

    .download-pill {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 22px));
      border-radius: 999px;
      padding: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .download-link {
      flex: 1;
      min-width: 140px;
      max-width: 220px;
      border-radius: 999px;
      padding: 12px 16px;
      text-decoration: none;
      font-size: 0.93rem;
      font-weight: 550;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.22);
      transition: 180ms ease;
    }

    .download-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 179, 106, 0.22);
      border-color: rgba(255, 179, 106, 0.58);
      color: #fff6eb;
    }

    .download-link small {
      display: block;
      margin-top: 2px;
      font-weight: 400;
      font-size: 0.75rem;
      opacity: 0.75;
    }

    @keyframes hover {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 680px) {
      .download-pill { flex-wrap: wrap; border-radius: 24px; }
      .download-link { max-width: none; }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="pico landing page">
    <section>
      <img class="mascot" src="256x256.png" alt="pico mascot" />
      <h1>pico</h1>
      <p>Fast captures. Clean marks. Zero friction.</p>
    </section>
  </main>

  <nav class="download-pill" aria-label="Download options">
    <a class="download-link" href="#" aria-label="Download for macOS">macOS <small>Apple Silicon + Intel</small></a>
    <a class="download-link" href="#" aria-label="Download for Windows">Windows <small>Installer + Portable</small></a>
    <a class="download-link" href="#" aria-label="Download for Linux">Linux <small>AppImage</small></a>
  </nav>
</body>
</html>
