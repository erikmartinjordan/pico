  <style>
    :root {
      --bg: #d7bea2;
      --bg-soft: #c9aa86;
      --text: #2e1c11;
      --muted: rgba(46, 28, 17, 0.68);
      --glass: rgba(255, 255, 255, 0.34);
      --glass-border: rgba(255, 255, 255, 0.68);
      --shadow: 0 24px 80px rgba(72, 40, 20, 0.18);
      --pill-shadow: 0 10px 30px rgba(72, 40, 20, 0.15);
    }

    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 16%, rgba(255,255,255,0.42), transparent 40%),
        radial-gradient(circle at 15% 86%, rgba(190, 150, 108, 0.22), transparent 45%),
        radial-gradient(circle at 85% 88%, rgba(173, 129, 90, 0.24), transparent 43%),
        linear-gradient(180deg, #dfc8ac, #d7bea2 60%, #cfb18f 100%);
      display: grid;
      place-items: center;
      position: relative;
    }

    .hero {
      height: 100vh;
      width: min(980px, 92vw);
      display: grid;
      place-items: center;
      text-align: center;
      padding-bottom: 132px;
    }

    .mascot {
      width: clamp(180px, 28vw, 290px);
      filter: drop-shadow(0 18px 36px rgba(68, 41, 22, 0.22));
      animation: hover 5.4s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    h1 {
      margin-top: 20px;
      font-size: clamp(1.55rem, 3vw, 2.25rem);
      letter-spacing: 0.02em;
      font-weight: 650;
    }

    p { margin-top: 10px; color: var(--muted); font-size: clamp(0.95rem, 1.5vw, 1.05rem); }

    .app-pill {
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(130%);
      -webkit-backdrop-filter: blur(20px) saturate(130%);
      box-shadow: var(--pill-shadow), inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .app-icon {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.5);
      display: grid;
      place-items: center;
      color: #4a2916;
    }

    .app-icon svg { width: 19px; height: 19px; }

    .download-pill {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(820px, calc(100vw - 20px));
      border-radius: 999px;
      padding: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .download-link {
      flex: 1;
      min-width: 170px;
      max-width: 250px;
      border-radius: 999px;
      padding: 11px 14px;
      text-decoration: none;
      color: #3b2518;
      background: rgba(255,255,255,0.54);
      border: 1px solid rgba(255,255,255,0.88);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 600;
      transition: 170ms ease;
    }

    .download-link:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.72);
    }

    .download-link svg { width: 18px; height: 18px; }

    @keyframes hover { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    @media (max-width: 760px) {
      .download-pill { flex-wrap: wrap; border-radius: 26px; }
      .download-link { max-width: none; }
    }
  </style>
</head>
