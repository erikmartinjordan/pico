<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="pico: lightweight capture app for macOS and Windows." />
  <title>pico · Download</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <style>
    :root {
      --bg: #07080c;
      --text: #f8f8f8;
      --muted: rgba(248, 248, 248, 0.7);
      --glass: rgba(255, 255, 255, 0.14);
      --glass-border: rgba(255, 255, 255, 0.32);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 179, 106, 0.16), transparent 42%),
        radial-gradient(circle at 20% 80%, rgba(124, 180, 255, 0.09), transparent 38%),
        radial-gradient(circle at 80% 85%, rgba(145, 120, 255, 0.08), transparent 40%),
        var(--bg);
      display: grid;
      place-items: center;
    }

    .hero {
      height: 100vh;
      width: min(960px, 92vw);
      display: grid;
      place-items: center;
      text-align: center;
      padding-bottom: 122px;
    }

    .mascot {
      width: 256px;
      height: 256px;
      filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.45));
      animation: hover 5.4s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    h1 { margin-top: 20px; font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 600; letter-spacing: 0.02em; }
    p { margin-top: 10px; color: var(--muted); font-size: clamp(0.95rem, 1.5vw, 1.05rem); }

    .download-pill {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      width: min(820px, calc(100vw - 22px));
      border-radius: 999px;
      padding: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .download-link {
      flex: 1;
      min-width: 148px;
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.22);
      transition: 180ms ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .download-link:hover { transform: translateY(-1px); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.38); }

    .icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }
    .icon svg { width: 14px; height: 14px; fill: white; }
    .icon.mac { background: linear-gradient(140deg, #9ca3af, #6b7280); }
    .icon.win { background: linear-gradient(140deg, #3b82f6, #06b6d4); }
    .icon.linux { background: linear-gradient(140deg, #f59e0b, #f97316); }
    .icon.git { background: linear-gradient(140deg, #24292f, #4b5563); }

    .meta { display: flex; flex-direction: column; line-height: 1.2; }
    .meta strong { font-size: 0.9rem; font-weight: 600; }
    .meta span { margin-top: 2px; font-size: 0.73rem; opacity: 0.74; }

    @keyframes hover { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    @media (max-width: 760px) {
      .download-pill { flex-wrap: wrap; border-radius: 24px; }
      .download-link { min-width: 45%; }
    }
  </style>
</head>
