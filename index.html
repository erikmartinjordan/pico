<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pico — Download</title>
  <style>
    :root {
      --bg: #d7bea2;
      --text: #2e1c11;
      --muted: rgba(46,28,17,0.68);
      --glass-bg: rgba(255,255,255,0.34);
      --glass-border: rgba(255,255,255,0.68);
      --btn-bg: rgba(255,255,255,0.54);
      --btn-border: rgba(255,255,255,0.88);
      --btn-hover: rgba(255,255,255,0.72);
      --shadow: 0 24px 80px rgba(72,40,20,0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 16%, rgba(255,255,255,0.42), transparent 40%),
        radial-gradient(circle at 15% 86%, rgba(190,150,108,0.22), transparent 45%),
        radial-gradient(circle at 85% 88%, rgba(173,129,90,0.24), transparent 43%),
        linear-gradient(180deg, #dfc8ac, #d7bea2 60%, #cfb18f 100%);
      background-color: var(--bg);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      isolation: isolate;
    }

    .hero {
      width: min(680px, calc(100vw - 24px));
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
      padding-bottom: 148px;
    }

    .mascot {
      width: clamp(160px, 24vw, 260px);
      height: auto;
      filter: drop-shadow(0 18px 36px rgba(68,41,22,0.22));
      animation: float 5.4s ease-in-out infinite;
      user-select: none;
    }

    h1 {
      margin: 2px 0 0;
      font-size: clamp(1.55rem, 3vw, 2.25rem);
      line-height: 1.1;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.98rem, 1.85vw, 1.08rem);
    }

    .liquid-glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(24px) saturate(180%) brightness(1.08);
      position: relative;
      isolation: isolate;
      box-shadow: var(--shadow);
    }

    .liquid-glass::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.85),
        inset 0 -1px 0 rgba(255,255,255,0.18),
        inset 1px 0 0 rgba(255,255,255,0.22),
        inset -1px 0 0 rgba(255,255,255,0.14);
    }

    .feature-pill {
      margin-top: 4px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
    }

    .mode-btn {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: rgba(46,28,17,0.88);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .mode-btn svg,
    .download-link svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .downloads {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 24px;
      width: min(820px, calc(100vw - 20px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .downloads-label {
      margin: 0;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .download-row {
      width: 100%;
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .download-link {
      flex: 1;
      min-width: 160px;
      max-width: 240px;
      border-radius: 12px;
      padding: 10px 16px;
      text-decoration: none;
      color: var(--text);
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 600;
      transition: transform 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 10px 24px rgba(72,40,20,0.12);
      position: relative;
      isolation: isolate;
    }

    .download-link:hover {
      transform: translateY(-1px);
      background: var(--btn-hover);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 12px 30px rgba(72,40,20,0.16);
    }

    .download-link svg { color: currentColor; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 760px) {
      .hero { padding-bottom: 190px; }
      .download-row { flex-wrap: wrap; }
      .download-link {
        max-width: none;
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="pico hero">
    <img class="mascot" src="256x256.png" alt="pico mascot" />
    <h1>pico</h1>
    <p>Fast captures. Clean marks. Zero friction.</p>

    <div class="feature-pill liquid-glass" aria-label="Capture modes">
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6V3h3"/>
          <path d="M15 6V3h-3"/>
          <path d="M3 12v3h3"/>
          <path d="M15 12v3h-3"/>
          <rect x="5.3" y="5.3" width="7.4" height="7.4" stroke-dasharray="2 2"/>
        </svg>
      </span>
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="12" height="10" rx="2"/>
          <path d="M3 7h12"/>
          <circle cx="5" cy="5.5" r="0.35"/>
          <circle cx="6.4" cy="5.5" r="0.35"/>
          <circle cx="7.8" cy="5.5" r="0.35"/>
        </svg>
      </span>
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="12" height="9" rx="1.8"/>
          <path d="M7.2 14.7h3.6"/>
          <path d="M9 12v2.7"/>
        </svg>
      </span>
      <span class="mode-btn" aria-hidden="true">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="12" height="10" rx="2"/>
          <path d="M7.2 7.1v3.8l3.7-1.9-3.7-1.9z"/>
        </svg>
      </span>
    </div>
  </main>

  <section class="downloads" aria-label="Download options">
    <p class="downloads-label">DOWNLOAD</p>
    <div class="download-row">
      <a class="download-link" href="#" aria-label="Download for macOS">
        <svg viewBox="0 0 814 1000" aria-hidden="true">
          <path fill="currentColor" d="M788 777c-16 37-35 72-59 107-33 49-60 83-81 103-33 34-69 52-108 55-28 0-61-8-100-24-39-16-75-24-108-24-34 0-71 8-112 24-41 16-74 25-99 25-37 2-74-17-109-56-22-21-51-57-86-108-37-55-68-119-92-192-25-77-37-152-37-225 0-84 18-156 54-216 28-49 66-88 113-116 47-28 98-43 153-44 30 0 69 9 117 27 47 18 77 27 90 27 10 0 43-10 98-31 52-19 96-27 132-24 98 8 171 46 220 114-88 53-132 126-131 219 1 72 27 132 79 180 23 23 49 41 77 55-6 17-12 33-19 49zM550 43c0 57-21 110-62 159-50 58-111 91-178 86-1-7-1-14-1-21 0-54 23-111 65-157 21-24 48-43 80-58 32-14 62-22 91-24 3 5 5 10 5 15z"/>
        </svg>
        <span>macOS</span>
      </a>
      <a class="download-link" href="#" aria-label="Download for Windows">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="3" width="9" height="8" fill="#F25022"/>
          <rect x="13" y="3" width="9" height="8" fill="#7FBA00"/>
          <rect x="2" y="13" width="9" height="8" fill="#00A4EF"/>
          <rect x="13" y="13" width="9" height="8" fill="#FFB900"/>

      <a class="download-link" href="#" aria-label="Download for Linux">
        <svg viewBox="0 0 256 300" aria-hidden="true">
          <path fill="currentColor" d="M128 14c-31 0-56 27-56 63 0 21 7 39 18 51-20 16-34 47-34 84 0 52 31 88 72 88 16 0 30-5 41-14 11 9 25 14 41 14 41 0 72-36 72-88 0-37-14-68-34-84 11-12 18-30 18-51 0-36-25-63-56-63-13 0-25 5-35 14-10-9-22-14-35-14zm-22 77c6 0 11 6 11 14s-5 14-11 14-11-6-11-14 5-14 11-14zm44 0c6 0 11 6 11 14s-5 14-11 14-11-6-11-14 5-14 11-14zm-22 37c22 0 39 8 39 19s-17 19-39 19-39-8-39-19 17-19 39-19z"/>
        </svg>
        <span>Linux</span>
      </a>
    </div>
  </section>
</body>
</html>
