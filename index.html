<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="pico: lightweight screen-capture & annotation app for macOS and Windows. Portable, fast, modern." />
  <meta property="og:title" content="pico — Capture, annotate, share" />
  <meta property="og:description" content="Cross-platform screenshot tool with annotation. Rectangles, arrows, text, blur — export to PNG in seconds." />
  <meta property="og:type" content="website" />
  <title>pico · Capture, annotate, share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --bg-soft: #111114;
      --surface: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --text-sec: #a1a1aa;
      --text-mut: #71717a;
      --accent: #3b82f6;
      --accent-2: #60a5fa;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(59, 130, 246, 0.12), transparent 60%);
      pointer-events: none;
    }

    .container { width: min(1000px, 90%); margin: 0 auto; }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav { display: flex; align-items: center; justify-content: space-between; height: 64px; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
    }

    .brand-icon svg { width: 18px; height: 18px; color: white; }

    nav a {
      color: var(--text-mut);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.15s;
    }

    nav a:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* Hero */
    .hero {
      padding: 120px 0 80px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent-2);
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
    }

    .lead {
      font-size: 1.15rem;
      color: var(--text-sec);
      max-width: 500px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.15s;
      border: none;
      cursor: pointer;
    }

    .btn svg { width: 18px; height: 18px; }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* Preview */
    .preview {
      max-width: 900px;
      margin: 60px auto 0;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 30px 80px rgba(0,0,0,0.5);
      background: var(--surface);
    }

    .preview-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
    }

    .preview-dots { display: flex; gap: 6px; }
    .preview-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border);
    }

    .preview-content {
      height: 400px;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-mut);
      font-size: 0.9rem;
    }

    .iso-wrap {
      transform: rotateX(54deg) rotateZ(-45deg);
      transform-style: preserve-3d;
      width: 520px;
      position: relative;
    }
    .window-group {
      animation: rise-in 0.9s cubic-bezier(0.34,1.4,0.64,1) both, float-loop 5s ease-in-out 1.2s infinite;
      transform-style: preserve-3d;
      position: relative;
      width: 520px;
      height: 340px;
    }
    @keyframes rise-in {
      from { transform: translateZ(-80px); opacity: 0; }
      to   { transform: translateZ(0px); opacity: 1; }
    }
    @keyframes float-loop {
      0%,100% { transform: translateZ(0px); }
      50% { transform: translateZ(10px); }
    }
    .win-left { position: absolute; width: 30px; height: 340px; background: #111113; top: 0; left: -30px; transform: rotateY(90deg); transform-origin: right center; }
    .win-bottom { position: absolute; width: 520px; height: 30px; background: #0e0e10; top: 340px; left: 0; transform: rotateX(-90deg); transform-origin: top center; }
    .win-top { position: absolute; top: 0; left: 0; width: 520px; height: 340px; background: #1c1c1e; border: 1px solid rgba(255,255,255,0.1); }
    .titlebar { position: absolute; top: 0; left: 0; right: 0; height: 36px; background: #28282c; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; padding: 0 12px; gap: 7px; }
    .tl { width: 11px; height: 11px; border-radius: 50%; }
    .tl.c { background: #ff5f56; } .tl.m { background: #ffbd2e; } .tl.x { background: #27c93f; }
    .app-name { position: absolute; left: 50%; transform: translateX(-50%); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; }
    .toolbar { position: absolute; top: 36px; left: 0; right: 0; height: 42px; background: #222226; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; padding: 0 10px; gap: 3px; }
    .tbtn { width: 28px; height: 28px; border-radius: 5px; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; transition: background 0.12s; }
    .tbtn:hover { background: rgba(255,255,255,0.08); }
    .tbtn.act { background: rgba(74,144,226,0.2); box-shadow: 0 0 0 1px #4a90e2; }
    .tbtn svg { width: 13px; height: 13px; stroke: rgba(255,255,255,0.5); fill: none; stroke-width: 1.5; }
    .tbtn.act svg { stroke: #4a90e2; }
    .tsep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 3px; flex-shrink: 0; }
    .sw { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; cursor: pointer; transition: transform 0.12s; }
    .sw:hover { transform: scale(1.2); }
    .sw.sel { box-shadow: 0 0 0 2px rgba(255,255,255,0.6); }
    .canvas-area { position: absolute; top: 78px; left: 0; right: 0; bottom: 26px; background-color: #0f0f0f; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 13px 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .empty-ring { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; animation: ring-pulse 3s ease-in-out infinite; }
    @keyframes ring-pulse { 0%,100% { border-color: rgba(255,255,255,0.1); } 50% { border-color: rgba(255,255,255,0.35); } }
    .empty-ring svg { width: 13px; height: 13px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
    .empty-title { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.75); }
    .empty-sub { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.02em; }
    .cta-row { display: flex; gap: 9px; margin-top: 6px; }
    .bcap { background: #4a90e2; color: #ffffff; border: none; border-radius: 7px; padding: 7px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; animation: cap-pulse 3s ease-in-out infinite; transition: background 0.15s, transform 0.1s; }
    .bcap:hover { background: #5aa0f2; transform: scale(1.03); }
    @keyframes cap-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(74,144,226,0); } 50% { box-shadow: 0 0 12px 3px rgba(74,144,226,0.45); } }
    .bcap svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 1.8; flex-shrink: 0; }
    .bopen { background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.22); border-radius: 7px; padding: 7px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
    .bopen:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.4); transform: scale(1.03); }
    .bopen svg { width: 12px; height: 12px; stroke: rgba(255,255,255,0.55); fill: none; stroke-width: 1.8; flex-shrink: 0; }
    .draw-anim { position: absolute; border: 1.5px solid #4a90e2; border-radius: 2px; opacity: 0; pointer-events: none; animation: draw-box 4s ease-in-out 2s infinite; }
    @keyframes draw-box { 0% { left:38%; top:40%; width:0; height:0; opacity:0; } 8% { opacity:1; } 55% { left:30%; top:28%; width:38%; height:40%; opacity:1; } 85% { left:30%; top:28%; width:38%; height:40%; opacity:0.5; } 100% { left:30%; top:28%; width:38%; height:40%; opacity:0; } }
    .statusbar { position: absolute; bottom: 0; left: 0; right: 0; height: 26px; background: #1a1a1d; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; }
    .statusbar span { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; color: rgba(255,255,255,0.28); letter-spacing: 0.05em; }

    /* Features */
    .features {
      padding: 100px 0;
    }

    .features h2 {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 48px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .feature {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.2s;
    }

    .feature:hover { border-color: rgba(59, 130, 246, 0.3); }

    .feature-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.1);
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      color: var(--accent-2);
    }

    .feature-icon svg { width: 20px; height: 20px; }

    .feature h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feature p {
      font-size: 0.9rem;
      color: var(--text-sec);
      line-height: 1.6;
    }

    /* Platforms */
    .platforms {
      padding: 60px 0 100px;
      text-align: center;
    }

    .platforms h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .platforms p {
      color: var(--text-mut);
      margin-bottom: 32px;
    }

    .platform-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
    }

    .platform-btn:hover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }

    .platform-btn svg { width: 24px; height: 24px; }
    .platform-btn span { font-weight: 600; }
    .platform-btn small { color: var(--text-mut); font-size: 0.8rem; }

    /* Footer */
    footer {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-mut);
    }

    footer a { color: var(--text-sec); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 640px) {
      .hero { padding: 80px 0 60px; }
      .preview-content { height: 250px; }
    }
  </style>
</head>
<body>
<div class="stage">
  <div class="iso-wrap">
    <div class="window-group">
      <div class="win-left"></div>
      <div class="win-bottom"></div>
      <div class="win-top">

        <div class="titlebar">
          <div class="tl c"></div>
          <div class="tl m"></div>
          <div class="tl x"></div>
          <span class="app-name">pico</span>
        </div>

    <div class="container">
      <div class="preview">
        <div class="preview-bar">
          <div class="preview-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="preview-content">
          <div class="iso-wrap"><div class="window-group"><div class="win-left"></div><div class="win-bottom"></div><div class="win-top"><div class="titlebar"><div class="tl c"></div><div class="tl m"></div><div class="tl x"></div><span class="app-name">pico</span></div><div class="toolbar"><div class="tbtn"><svg viewBox="0 0 16 16"><rect x="3" y="2" width="10" height="12" rx="1"/><path d="M9 2v4h4"/></svg></div><div class="tbtn"><svg viewBox="0 0 16 16"><path d="M2 5h5l1.5-2H14v9H2V5z"/></svg></div><div class="tbtn"><svg viewBox="0 0 16 16"><path d="M3 3h8l2 2v8H3V3z"/><rect x="5" y="9" width="6" height="4"/></svg></div><div class="tbtn"><svg viewBox="0 0 16 16"><rect x="5" y="5" width="8" height="9" rx="1"/><path d="M3 11V3h8"/></svg></div><div class="tsep"></div><div class="tbtn act" id="tool-rect"><svg viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="8" rx="1"/></svg></div><div class="tbtn" id="tool-ellipse"><svg viewBox="0 0 16 16"><ellipse cx="8" cy="8" rx="6" ry="4"/></svg></div><div class="tbtn" id="tool-arrow"><svg viewBox="0 0 16 16"><path d="M3 13L13 3M13 3H7M13 3V9"/></svg></div><div class="tbtn" id="tool-line"><svg viewBox="0 0 16 16"><line x1="2" y1="14" x2="14" y2="2"/></svg></div><div class="tbtn" id="tool-text"><svg viewBox="0 0 16 16"><path d="M3 4h10M8 4v9"/></svg></div><div class="tsep"></div><div class="sw sel" style="background:#ef4444;"></div><div class="sw" style="background:#f97316;"></div><div class="sw" style="background:#22c55e;"></div><div class="sw" style="background:#3b82f6;"></div><div class="sw" style="background:#a855f7;"></div><div class="sw" style="background:#1f2937;border:1px solid rgba(255,255,255,0.15);"></div><div class="tsep"></div><div class="tbtn" style="width:24px;"><div style="width:16px;height:1.5px;background:rgba(255,255,255,0.45);border-radius:1px;"></div></div><div class="tbtn act" style="width:24px;"><div style="width:16px;height:3px;background:#4a90e2;border-radius:1px;"></div></div><div class="tbtn" style="width:24px;"><div style="width:16px;height:5px;background:rgba(255,255,255,0.45);border-radius:1px;"></div></div></div><div class="canvas-area"><div class="draw-anim"></div><div class="empty-ring"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="10.5" r="0.8" fill="rgba(255,255,255,0.25)"/></svg></div><div class="empty-title">No image loaded</div><div class="empty-sub">Capture your screen or open an image to begin</div><div class="cta-row"><button class="bcap"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/></svg>Capture Screen</button><button class="bopen"><svg viewBox="0 0 16 16"><rect x="1" y="4" width="14" height="10" rx="1"/><path d="M1 7h14M5 4V2h6v2"/></svg>Open Image</button></div></div><div class="statusbar"><span id="status-left">Rectangle · 0 annotations</span><span>100%</span></div></div></div></div>
        </div>

        <div class="canvas-area">
          <div class="draw-anim"></div>
          <div class="empty-ring">
            <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="10.5" r="0.8" fill="rgba(255,255,255,0.25)"/></svg>
          </div>
          <div class="empty-title">No image loaded</div>
          <div class="empty-sub">Capture your screen or open an image to begin</div>
          <div class="cta-row">
            <button class="bcap">
              <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/></svg>
              Capture Screen
            </button>
            <button class="bopen">
              <svg viewBox="0 0 16 16"><rect x="1" y="4" width="14" height="10" rx="1"/><path d="M1 7h14M5 4V2h6v2"/></svg>
              Open Image
            </button>
          </div>
        </div>

        <div class="statusbar">
          <span id="status-left">Rectangle · 0 annotations</span>
          <span>100%</span>
        </div>

      </div>
    </div>
  </footer>

  <script>
    const tools = ['tool-rect','tool-ellipse','tool-arrow','tool-line','tool-text'];
    const names = { 'tool-rect':'Rectangle','tool-ellipse':'Ellipse','tool-arrow':'Arrow','tool-line':'Line','tool-text':'Text' };
    tools.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', () => {
        tools.forEach(t => document.getElementById(t)?.classList.remove('act'));
        el.classList.add('act');
        const status = document.getElementById('status-left');
        if (status) status.textContent = names[id] + ' · 0 annotations';
      });
    });
    document.querySelectorAll('.sw').forEach(s => {
      s.addEventListener('click', () => {
        document.querySelectorAll('.sw').forEach(x => x.classList.remove('sel'));
        s.classList.add('sel');
      });
    });

    // Auto-detect GitHub repo from URL
    const host = window.location.hostname;
    const path = window.location.pathname.split('/').filter(Boolean);
    
    let owner = '', repo = '';
    if (host.endsWith('github.io')) {
      owner = host.split('.')[0];
      repo = path[0] || '';
    }
    
    if (owner && repo) {
      const repoUrl = `https://github.com/${owner}/${repo}`;
      const releaseUrl = `https://github.com/${owner}/${repo}/releases/latest`;
      
      document.querySelectorAll('#github-link, #github-btn, #footer-github').forEach(el => {
        el.href = repoUrl;
      });
      
      document.getElementById('download-mac').href = releaseUrl;
      document.getElementById('download-win').href = releaseUrl;
    }
  </script>
</body>
</html>
