<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pico — Descarga</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #007aff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(700px, 100%);
      text-align: center;
      background: var(--card);
      border-radius: 24px;
      padding: 48px 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.04em;
    }
    p {
      margin: 14px auto 0;
      max-width: 56ch;
      color: var(--muted);
      line-height: 1.5;
    }
    .cta {
      margin-top: 30px;
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 24px;
      border-radius: 999px;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 10px 24px rgba(0, 122, 255, 0.35);
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(0, 122, 255, 0.4);
    }
    .hint {
      margin-top: 14px;
      font-size: .9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>pico</h1>
    <p>
      Captura pantalla y anota en segundos con una interfaz limpia.
      Descarga la versión portable para Windows y ejecuta sin instalación.
    </p>
    <a class="cta" href="./dist/pico.exe" download>⬇ Descargar pico.exe</a>
    <p class="hint">Compatible con Windows 10 y 11.</p>
  </main>
</body>
</html>
