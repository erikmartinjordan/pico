<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: default;
    }
    
    body.region-mode {
      cursor: crosshair;
    }
    
    #overlay {
      position: fixed;
      inset: 0;
      transition: opacity 0.2s ease;
    }

    #overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    
    #selection {
      position: absolute;
      border: 2px solid #f07d20;
      background: transparent;
      pointer-events: none;
      display: none;
    }
    
    #selection.visible {
      display: block;
    }
    
    #selection::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(240, 125, 32, 0.08);
    }
    
    #dimensions {
      position: absolute;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      pointer-events: none;
      display: none;
    }
    
    #dimensions.visible {
      display: block;
    }

    #window-highlight {
      position: absolute;
      border: 3px solid #f07d20;
      background: transparent;
      pointer-events: none;
      display: none;
      border-radius: 6px;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.3),
        0 0 20px rgba(240, 125, 32, 0.7),
        0 0 40px rgba(240, 125, 32, 0.4),
        0 0 60px rgba(240, 125, 32, 0.15),
        inset 0 0 12px rgba(240, 125, 32, 0.15);
      transition: top 0.08s ease, left 0.08s ease, width 0.08s ease, height 0.08s ease;
    }

    #window-highlight.visible {
      display: block;
    }

    #window-label {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: #f07d20;
      padding: 5px 12px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 500;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(240, 125, 32, 0.5);
    }

    #window-label.visible {
      display: block;
    }
    
    #instructions {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      transition: opacity 0.3s ease;
    }
    
    #instructions kbd {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
    }

    /* Isolated capture result view */
    #capture-result {
      position: fixed;
      inset: 0;
      background: #1a1a1c;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 100;
    }

    #capture-result.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #capture-result img {
      max-width: 85vw;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6),
                  0 0 0 1px rgba(255, 255, 255, 0.06);
      transform: scale(0.92);
      opacity: 0.5;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
    }

    #capture-result.visible img {
      transform: scale(1);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <canvas id="canvas"></canvas>
    <div id="selection"></div>
    <div id="dimensions"></div>
    <div id="window-highlight"></div>
    <div id="window-label"></div>
    <div id="instructions">
      Drag to select region &middot; Press <kbd>Esc</kbd> to cancel
    </div>
  </div>
  <div id="capture-result"></div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const selection = document.getElementById('selection');
    const dimensions = document.getElementById('dimensions');
    const windowHighlight = document.getElementById('window-highlight');
    const windowLabel = document.getElementById('window-label');
    const overlay = document.getElementById('overlay');
    const captureResult = document.getElementById('capture-result');
    
    let captureData = null;
    let captureMode = 'region';
    let currentBounds = null;
    let windowBounds = []; // Array of {name, x, y, width, height} in display-relative coords
    let hoveredWindow = null;
    let isSelecting = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;

    // Store the original undimmed image for window mode
    let originalImageCanvas = null;
    
    // Listen for capture data from main process
    window.pico.onCaptureData(async (data) => {
      captureData = data;
      captureMode = data.mode || 'region';
      currentBounds = data.bounds || null;
      windowBounds = data.windowBounds || [];
      
      if (captureMode === 'window') {
        document.getElementById('instructions').innerHTML = 'Click on a window to capture &middot; Press <kbd>Esc</kbd> to cancel';
      } else {
        document.body.classList.add('region-mode');
      }
      
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      if (data.type === 'multi') {
        await compositeScreens(data);
      } else {
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          // Store original undimmed image for window mode
          if (captureMode === 'window') {
            originalImageCanvas = document.createElement('canvas');
            originalImageCanvas.width = canvas.width;
            originalImageCanvas.height = canvas.height;
            originalImageCanvas.getContext('2d').drawImage(canvas, 0, 0);
          }
          applyDarkOverlay();
        };
        img.src = data.dataUrl;
      }
    });
    
    async function compositeScreens(data) {
      const { screens, virtualBounds } = data;
      const scaleX = canvas.width / virtualBounds.width;
      const scaleY = canvas.height / virtualBounds.height;
      
      for (const screen of screens) {
        const img = await loadImage(screen.dataUrl);
        const x = (screen.bounds.x - virtualBounds.x) * scaleX;
        const y = (screen.bounds.y - virtualBounds.y) * scaleY;
        const w = screen.bounds.width * scaleX;
        const h = screen.bounds.height * scaleY;
        ctx.drawImage(img, x, y, w, h);
      }
      
      // Store original undimmed image for window mode
      if (captureMode === 'window') {
        originalImageCanvas = document.createElement('canvas');
        originalImageCanvas.width = canvas.width;
        originalImageCanvas.height = canvas.height;
        originalImageCanvas.getContext('2d').drawImage(canvas, 0, 0);
      }
      
      applyDarkOverlay();
    }
    
    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
    }
    
    function applyDarkOverlay() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Redraw canvas with the hovered window shown at full brightness
    function redrawWithWindowHighlight(win) {
      if (!originalImageCanvas) return;
      
      // Draw the dimmed version (original + dark overlay)
      ctx.drawImage(originalImageCanvas, 0, 0);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (win) {
        // Draw the original (undimmed) image clipped to the window area
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(win.x, win.y, win.width, win.height, 6);
        ctx.clip();
        ctx.drawImage(originalImageCanvas, 0, 0);
        ctx.restore();
      }
    }

    // Find which window the cursor is over (topmost = first in list)
    function findWindowAt(clientX, clientY) {
      for (const wb of windowBounds) {
        if (clientX >= wb.x && clientX <= wb.x + wb.width &&
            clientY >= wb.y && clientY <= wb.y + wb.height) {
          return wb;
        }
      }
      return null;
    }

    // Show the captured window isolated on a neutral background
    function showIsolatedCapture(dataUrl) {
      // Fade out the overlay
      overlay.classList.add('fade-out');
      
      // Show isolated result
      const img = document.createElement('img');
      img.src = dataUrl;
      captureResult.innerHTML = '';
      captureResult.appendChild(img);

      // Trigger reflow then animate in
      requestAnimationFrame(() => {
        captureResult.classList.add('visible');
      });

      // Send to main process after the animation completes
      setTimeout(() => {
        window.pico.captureComplete(dataUrl);
      }, 600);
    }
    
    // Mouse events
    document.addEventListener('mousedown', (e) => {
      if (captureMode === 'window') {
        if (hoveredWindow) {
          // Capture the hovered window region and show isolated
          captureWindowIsolated(hoveredWindow);
        }
        return;
      }
      isSelecting = true;
      startX = e.clientX;
      startY = e.clientY;
      currentX = startX;
      currentY = startY;
      
      selection.classList.add('visible');
      dimensions.classList.add('visible');
      updateSelection();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (captureMode === 'window') {
        const win = findWindowAt(e.clientX, e.clientY);
        
        // Only redraw if hovered window changed
        if (win !== hoveredWindow) {
          hoveredWindow = win;
          redrawWithWindowHighlight(win);
          
          if (win) {
            windowHighlight.style.left = win.x + 'px';
            windowHighlight.style.top = win.y + 'px';
            windowHighlight.style.width = win.width + 'px';
            windowHighlight.style.height = win.height + 'px';
            windowHighlight.classList.add('visible');
            
            windowLabel.textContent = win.name;
            windowLabel.style.left = (win.x + 5) + 'px';
            windowLabel.style.top = (win.y > 30 ? win.y - 30 : win.y + win.height + 5) + 'px';
            windowLabel.classList.add('visible');
          } else {
            windowHighlight.classList.remove('visible');
            windowLabel.classList.remove('visible');
          }
        }
        return;
      }
      if (!isSelecting) return;
      
      currentX = e.clientX;
      currentY = e.clientY;
      updateSelection();
    });
    
    document.addEventListener('mouseup', (e) => {
      if (!isSelecting) return;
      isSelecting = false;
      
      const x = Math.min(startX, currentX);
      const y = Math.min(startY, currentY);
      const width = Math.abs(currentX - startX);
      const height = Math.abs(currentY - startY);
      
      if (width < 10 || height < 10) {
        window.pico.captureCancel();
        return;
      }
      
      captureRegion(x, y, width, height);
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.pico.captureCancel();
      }
    });
    
    function updateSelection() {
      const x = Math.min(startX, currentX);
      const y = Math.min(startY, currentY);
      const width = Math.abs(currentX - startX);
      const height = Math.abs(currentY - startY);
      
      selection.style.left = x + 'px';
      selection.style.top = y + 'px';
      selection.style.width = width + 'px';
      selection.style.height = height + 'px';
      
      dimensions.textContent = `${width} \u00d7 ${height}`;
      dimensions.style.left = (x + 5) + 'px';
      dimensions.style.top = (y - 25) + 'px';
      
      if (y < 30) {
        dimensions.style.top = (y + height + 5) + 'px';
      }
    }

    // Capture a window and show it isolated on neutral background
    function captureWindowIsolated(win) {
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');

      if (captureData.type === 'multi') {
        Promise.all(captureData.screens.map(s => loadImage(s.dataUrl))).then(images => {
          const { virtualBounds } = captureData;
          const selX = (win.x / viewW) * virtualBounds.width;
          const selY = (win.y / viewH) * virtualBounds.height;
          const selW = (win.width / viewW) * virtualBounds.width;
          const selH = (win.height / viewH) * virtualBounds.height;
          const selX2 = selX + selW;
          const selY2 = selY + selH;

          let outputWidth = 0;
          let outputHeight = 0;

          captureData.screens.forEach((screen) => {
            const screenX = screen.bounds.x - virtualBounds.x;
            const screenY = screen.bounds.y - virtualBounds.y;
            const screenX2 = screenX + screen.bounds.width;
            const screenY2 = screenY + screen.bounds.height;
            const overlapX1 = Math.max(selX, screenX);
            const overlapY1 = Math.max(selY, screenY);
            const overlapX2 = Math.min(selX2, screenX2);
            const overlapY2 = Math.min(selY2, screenY2);
            if (overlapX2 <= overlapX1 || overlapY2 <= overlapY1) return;
            const scale = screen.scaleFactor || 1;
            outputWidth = Math.max(outputWidth, Math.round((overlapX2 - selX) * scale));
            outputHeight = Math.max(outputHeight, Math.round((overlapY2 - selY) * scale));
          });

          if (outputWidth <= 0 || outputHeight <= 0) {
            window.pico.captureCancel();
            return;
          }

          tempCanvas.width = outputWidth;
          tempCanvas.height = outputHeight;

          images.forEach((img, i) => {
            const screen = captureData.screens[i];
            const scale = screen.scaleFactor || 1;
            const screenX = screen.bounds.x - virtualBounds.x;
            const screenY = screen.bounds.y - virtualBounds.y;
            const screenX2 = screenX + screen.bounds.width;
            const screenY2 = screenY + screen.bounds.height;
            const overlapX1 = Math.max(selX, screenX);
            const overlapY1 = Math.max(selY, screenY);
            const overlapX2 = Math.min(selX2, screenX2);
            const overlapY2 = Math.min(selY2, screenY2);
            if (overlapX2 <= overlapX1 || overlapY2 <= overlapY1) return;
            const srcX = Math.round((overlapX1 - screenX) * scale);
            const srcY = Math.round((overlapY1 - screenY) * scale);
            const srcW = Math.round((overlapX2 - overlapX1) * scale);
            const srcH = Math.round((overlapY2 - overlapY1) * scale);
            const destX = Math.round((overlapX1 - selX) * scale);
            const destY = Math.round((overlapY1 - selY) * scale);
            tempCtx.drawImage(img, srcX, srcY, srcW, srcH, destX, destY, srcW, srcH);
          });

          showIsolatedCapture(tempCanvas.toDataURL('image/png'));
        });
      } else {
        const img = new Image();
        img.onload = () => {
          const scaleX = img.width / viewW;
          const scaleY = img.height / viewH;
          const cropX = win.x * scaleX;
          const cropY = win.y * scaleY;
          const cropWidth = win.width * scaleX;
          const cropHeight = win.height * scaleY;

          tempCanvas.width = Math.round(cropWidth);
          tempCanvas.height = Math.round(cropHeight);
          tempCtx.drawImage(img, cropX, cropY, cropWidth, cropHeight, 0, 0, tempCanvas.width, tempCanvas.height);
          showIsolatedCapture(tempCanvas.toDataURL('image/png'));
        };
        img.src = captureData.dataUrl;
      }
    }
    
    function captureRegion(x, y, width, height) {
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      
      if (captureData.type === 'multi') {
        Promise.all(captureData.screens.map(s => loadImage(s.dataUrl))).then(images => {
          const { virtualBounds } = captureData;
          
          const selX = (x / viewW) * virtualBounds.width;
          const selY = (y / viewH) * virtualBounds.height;
          const selW = (width / viewW) * virtualBounds.width;
          const selH = (height / viewH) * virtualBounds.height;
          const selX2 = selX + selW;
          const selY2 = selY + selH;
          
          let outputWidth = 0;
          let outputHeight = 0;

          captureData.screens.forEach((screen) => {
            const screenX = screen.bounds.x - virtualBounds.x;
            const screenY = screen.bounds.y - virtualBounds.y;
            const screenX2 = screenX + screen.bounds.width;
            const screenY2 = screenY + screen.bounds.height;

            const overlapX1 = Math.max(selX, screenX);
            const overlapY1 = Math.max(selY, screenY);
            const overlapX2 = Math.min(selX2, screenX2);
            const overlapY2 = Math.min(selY2, screenY2);

            if (overlapX2 <= overlapX1 || overlapY2 <= overlapY1) return;

            const scale = screen.scaleFactor || 1;
            outputWidth = Math.max(outputWidth, Math.round((overlapX2 - selX) * scale));
            outputHeight = Math.max(outputHeight, Math.round((overlapY2 - selY) * scale));
          });

          if (outputWidth <= 0 || outputHeight <= 0) {
            window.pico.captureCancel();
            return;
          }

          tempCanvas.width = outputWidth;
          tempCanvas.height = outputHeight;

          images.forEach((img, i) => {
            const screen = captureData.screens[i];
            const scale = screen.scaleFactor || 1;

            const screenX = screen.bounds.x - virtualBounds.x;
            const screenY = screen.bounds.y - virtualBounds.y;
            const screenX2 = screenX + screen.bounds.width;
            const screenY2 = screenY + screen.bounds.height;

            const overlapX1 = Math.max(selX, screenX);
            const overlapY1 = Math.max(selY, screenY);
            const overlapX2 = Math.min(selX2, screenX2);
            const overlapY2 = Math.min(selY2, screenY2);

            if (overlapX2 <= overlapX1 || overlapY2 <= overlapY1) return;

            const srcX = Math.round((overlapX1 - screenX) * scale);
            const srcY = Math.round((overlapY1 - screenY) * scale);
            const srcW = Math.round((overlapX2 - overlapX1) * scale);
            const srcH = Math.round((overlapY2 - overlapY1) * scale);

            const destX = Math.round((overlapX1 - selX) * scale);
            const destY = Math.round((overlapY1 - selY) * scale);

            tempCtx.drawImage(img, srcX, srcY, srcW, srcH, destX, destY, srcW, srcH);
          });

          window.pico.captureComplete(tempCanvas.toDataURL('image/png'));
        });
      } else {
        // Single screen - map viewport selection to native image pixels
        const img = new Image();
        img.onload = () => {
          const scaleX = img.width / viewW;
          const scaleY = img.height / viewH;
          const cropX = x * scaleX;
          const cropY = y * scaleY;
          const cropWidth = width * scaleX;
          const cropHeight = height * scaleY;

          tempCanvas.width = Math.round(cropWidth);
          tempCanvas.height = Math.round(cropHeight);

          tempCtx.drawImage(
            img,
            cropX,
            cropY,
            cropWidth,
            cropHeight,
            0,
            0,
            tempCanvas.width,
            tempCanvas.height
          );
          window.pico.captureComplete(tempCanvas.toDataURL('image/png'));
        };
        img.src = captureData.dataUrl;
      }
    }
  </script>
</body>
</html>
