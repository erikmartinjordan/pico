<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: crosshair;
    }
    
    #overlay {
      position: fixed;
      inset: 0;
    }
    
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    
    #selection {
      position: absolute;
      border: 2px solid #f07d20;
      background: transparent;
      pointer-events: none;
      display: none;
    }
    
    #selection.visible {
      display: block;
    }
    
    #selection::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(240, 125, 32, 0.08);
    }
    
    #dimensions {
      position: absolute;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      pointer-events: none;
      display: none;
    }
    
    #dimensions.visible {
      display: block;
    }

    #window-highlight {
      position: absolute;
      border: 3px solid #ffaa55;
      background: rgba(255, 170, 85, 0.08);
      pointer-events: none;
      display: none;
      border-radius: 4px;
    }

    #window-highlight.visible {
      display: block;
    }

    #window-label {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: #ffaa55;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 500;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #window-label.visible {
      display: block;
    }
    
    #instructions {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }
    
    #instructions kbd {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <canvas id="canvas"></canvas>
    <div id="selection"></div>
    <div id="dimensions"></div>
    <div id="window-highlight"></div>
    <div id="window-label"></div>
    <div id="instructions">
      Drag to select region &middot; Press <kbd>Esc</kbd> to cancel
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const selection = document.getElementById('selection');
    const dimensions = document.getElementById('dimensions');
    const windowHighlight = document.getElementById('window-highlight');
    const windowLabel = document.getElementById('window-label');
    
    let captureData = null;
    let captureMode = 'region';
    let currentBounds = null;
    let windowBounds = []; // Array of {name, x, y, width, height} in display-relative coords
    let hoveredWindow = null;
    let isSelecting = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;
    
    // Listen for capture data from main process
    window.pico.onCaptureData(async (data) => {
      captureData = data;
      captureMode = data.mode || 'region';
      currentBounds = data.bounds || null;
      windowBounds = data.windowBounds || [];
      
      if (captureMode === 'window') {
        document.getElementById('instructions').innerHTML = 'Hover over a window and click to capture &middot; Press <kbd>Esc</kbd> to cancel';
        document.body.style.cursor = 'default';
      }
      
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      if (data.type === 'multi') {
        await compositeScreens(data);
      } else {
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          applyDarkOverlay();
        };
        img.src = data.dataUrl;
      }
    });
    
    async function compositeScreens(data) {
      const { screens, virtualBounds } = data;
      const scaleX = canvas.width / virtualBounds.width;
      const scaleY = canvas.height / virtualBounds.height;
      
      for (const screen of screens) {
        const img = await loadImage(screen.dataUrl);
        const x = (screen.bounds.x - virtualBounds.x) * scaleX;
        const y = (screen.bounds.y - virtualBounds.y) * scaleY;
        const w = screen.bounds.width * scaleX;
        const h = screen.bounds.height * scaleY;
        ctx.drawImage(img, x, y, w, h);
      }
      
      applyDarkOverlay();
    }
    
    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
    }
    
    function applyDarkOverlay() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Find which window the cursor is over (topmost = first in list)
    function findWindowAt(clientX, clientY) {
      for (const wb of windowBounds) {
        if (clientX >= wb.x && clientX <= wb.x + wb.width &&
            clientY >= wb.y && clientY <= wb.y + wb.height) {
          return wb;
        }
      }
      return null;
    }
    
    // Mouse events
    document.addEventListener('mousedown', (e) => {
      if (captureMode === 'window') {
        if (hoveredWindow) {
          // Capture the hovered window region
          captureRegion(hoveredWindow.x, hoveredWindow.y, hoveredWindow.width, hoveredWindow.height);
        }
        return;
      }
      isSelecting = true;
      startX = e.clientX;
      startY = e.clientY;
      currentX = startX;
      currentY = startY;
      
      selection.classList.add('visible');
      dimensions.classList.add('visible');
      updateSelection();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (captureMode === 'window') {
        const win = findWindowAt(e.clientX, e.clientY);
        hoveredWindow = win;
        if (win) {
          windowHighlight.style.left = win.x + 'px';
          windowHighlight.style.top = win.y + 'px';
          windowHighlight.style.width = win.width + 'px';
          windowHighlight.style.height = win.height + 'px';
          windowHighlight.classList.add('visible');
          
          windowLabel.textContent = win.name;
          windowLabel.style.left = (win.x + 5) + 'px';
          windowLabel.style.top = (win.y > 30 ? win.y - 28 : win.y + win.height + 5) + 'px';
          windowLabel.classList.add('visible');
          
          document.body.style.cursor = 'pointer';
        } else {
          windowHighlight.classList.remove('visible');
          windowLabel.classList.remove('visible');
          document.body.style.cursor = 'default';
        }
        return;
      }
      if (!isSelecting) return;
      
      currentX = e.clientX;
      currentY = e.clientY;
      updateSelection();
    });
    
    document.addEventListener('mouseup', (e) => {
      if (!isSelecting) return;
      isSelecting = false;
      
      const x = Math.min(startX, currentX);
      const y = Math.min(startY, currentY);
      const width = Math.abs(currentX - startX);
      const height = Math.abs(currentY - startY);
      
      if (width < 10 || height < 10) {
        window.pico.captureCancel();
        return;
      }
      
      captureRegion(x, y, width, height);
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.pico.captureCancel();
      }
    });
    
    function updateSelection() {
      const x = Math.min(startX, currentX);
      const y = Math.min(startY, currentY);
      const width = Math.abs(currentX - startX);
      const height = Math.abs(currentY - startY);
      
      selection.style.left = x + 'px';
      selection.style.top = y + 'px';
      selection.style.width = width + 'px';
      selection.style.height = height + 'px';
      
      dimensions.textContent = `${width} \u00d7 ${height}`;
      dimensions.style.left = (x + 5) + 'px';
      dimensions.style.top = (y - 25) + 'px';
      
      if (y < 30) {
        dimensions.style.top = (y + height + 5) + 'px';
      }
    }
    
    function captureRegion(x, y, width, height) {
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      
      if (captureData.type === 'multi') {
        Promise.all(captureData.screens.map(s => loadImage(s.dataUrl))).then(images => {
          const { virtualBounds } = captureData;
          
          const selX = (x / viewW) * virtualBounds.width;
          const selY = (y / viewH) * virtualBounds.height;
          const selW = (width / viewW) * virtualBounds.width;
          const selH = (height / viewH) * virtualBounds.height;
          const selX2 = selX + selW;
          const selY2 = selY + selH;
          
          let outputWidth = 0;
          let outputHeight = 0;

          captureData.screens.forEach((screen) => {
            const screenX = screen.bounds.x - virtualBounds.x;
            const screenY = screen.bounds.y - virtualBounds.y;
            const screenX2 = screenX + screen.bounds.width;
            const screenY2 = screenY + screen.bounds.height;

            const overlapX1 = Math.max(selX, screenX);
            const overlapY1 = Math.max(selY, screenY);
            const overlapX2 = Math.min(selX2, screenX2);
            const overlapY2 = Math.min(selY2, screenY2);

            if (overlapX2 <= overlapX1 || overlapY2 <= overlapY1) return;

            const scale = screen.scaleFactor || 1;
            outputWidth = Math.max(outputWidth, Math.round((overlapX2 - selX) * scale));
            outputHeight = Math.max(outputHeight, Math.round((overlapY2 - selY) * scale));
          });

          if (outputWidth <= 0 || outputHeight <= 0) {
            window.pico.captureCancel();
            return;
          }

          tempCanvas.width = outputWidth;
          tempCanvas.height = outputHeight;

          images.forEach((img, i) => {
            const screen = captureData.screens[i];
            const scale = screen.scaleFactor || 1;

            const screenX = screen.bounds.x - virtualBounds.x;
            const screenY = screen.bounds.y - virtualBounds.y;
            const screenX2 = screenX + screen.bounds.width;
            const screenY2 = screenY + screen.bounds.height;

            const overlapX1 = Math.max(selX, screenX);
            const overlapY1 = Math.max(selY, screenY);
            const overlapX2 = Math.min(selX2, screenX2);
            const overlapY2 = Math.min(selY2, screenY2);

            if (overlapX2 <= overlapX1 || overlapY2 <= overlapY1) return;

            const srcX = Math.round((overlapX1 - screenX) * scale);
            const srcY = Math.round((overlapY1 - screenY) * scale);
            const srcW = Math.round((overlapX2 - overlapX1) * scale);
            const srcH = Math.round((overlapY2 - overlapY1) * scale);

            const destX = Math.round((overlapX1 - selX) * scale);
            const destY = Math.round((overlapY1 - selY) * scale);

            tempCtx.drawImage(img, srcX, srcY, srcW, srcH, destX, destY, srcW, srcH);
          });

          window.pico.captureComplete(tempCanvas.toDataURL('image/png'));
        });
      } else {
        // Single screen - map viewport selection to native image pixels
        const img = new Image();
        img.onload = () => {
          const scaleX = img.width / viewW;
          const scaleY = img.height / viewH;
          const cropX = x * scaleX;
          const cropY = y * scaleY;
          const cropWidth = width * scaleX;
          const cropHeight = height * scaleY;

          tempCanvas.width = Math.round(cropWidth);
          tempCanvas.height = Math.round(cropHeight);

          tempCtx.drawImage(
            img,
            cropX,
            cropY,
            cropWidth,
            cropHeight,
            0,
            0,
            tempCanvas.width,
            tempCanvas.height
          );
          window.pico.captureComplete(tempCanvas.toDataURL('image/png'));
        };
        img.src = captureData.dataUrl;
      }
    }
  </script>
</body>
</html>
