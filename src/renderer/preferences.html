<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>Preferences</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="preferences-window">
  <form class="preferences-panel" id="preferences-form" aria-label="Preferences">
    <div class="preferences-titlebar" aria-hidden="true"></div>
    <header class="preferences-header">
      <img src="../assets/icons/macos/256x256.png" alt="" width="48" height="48">
      <div>
        <h1>Orange Fuji</h1>
        <p>Preferences</p>
      </div>
    </header>

    <section class="preferences-group" aria-label="Recording">
      <label>Recording format
        <select id="recording-format-setting"><option value="mp4">MP4</option><option value="gif">GIF</option></select>
      </label>
      <label><span>Autozoom on region recording</span><input type="checkbox" id="recording-autozoom-setting" checked></label>
      <label><span>Hide desktop icons while capturing</span><input type="checkbox" id="hide-desktop-icons-setting" checked></label>
    </section>

    <section class="preferences-group preferences-field preferences-field--path" aria-label="Saving">
      <div>
        <label for="default-save-path-setting">Default save path</label>
        <p>Choose the folder used first when saving screenshots and recordings.</p>
      </div>
      <div class="path-picker">
        <input type="text" id="default-save-path-setting" placeholder="System default" readonly>
        <button type="button" id="choose-default-save-path-setting">Choose…</button>
        <button type="button" id="clear-default-save-path-setting" class="secondary">Clear</button>
      </div>
    </section>
  </form>

  <script src="preferences.js"></script>
</body>
</html>
