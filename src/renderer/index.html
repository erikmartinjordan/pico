<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>pico</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="canvas-container" id="canvas-container">
    <div class="toolbar">
      <div class="toolbar-group capture-modes">
        <button class="toolbar-btn" id="btn-capture-region" title="Capture region"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8V4h4"/><path d="M4 16v4h4"/><path d="M16 4h4v4"/><path d="M16 20h4v-4"/><rect x="8" y="8" width="8" height="8" rx="1" stroke-dasharray="2 2"/></svg></button>
        <button class="toolbar-btn" id="btn-capture-window" title="Capture window"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 8h18"/><circle cx="5.5" cy="6" r=".5" fill="currentColor"/><circle cx="7.5" cy="6" r=".5" fill="currentColor"/><circle cx="9.5" cy="6" r=".5" fill="currentColor"/></svg></button>
        <button class="toolbar-btn" id="btn-capture-fullscreen" title="Capture fullscreen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M6 21h12"/><path d="M12 17v4"/></svg></button>
        <div class="recording-format-wrap">
          <button class="toolbar-btn pro-feature" id="btn-record-screen" title="Record screen video"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="13" height="14" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg></button>
          <div class="recording-format-menu" id="recording-format-menu" role="menu" aria-label="Recording format" aria-hidden="true">
            <button type="button" data-mode="region" data-format="mp4" role="menuitem" tabindex="-1">Region MP4 + autozoom</button>
            <button type="button" data-mode="region" data-format="gif" role="menuitem" tabindex="-1">Region GIF + autozoom</button>
          </div>
        </div>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group tools">
        <button class="toolbar-btn tool-btn" data-tool="select" title="Select / Move"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 4l6 15 2-6 6-2z"/></svg></button>
        <button class="toolbar-btn tool-btn active" data-tool="rect" title="Rectangle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="5" width="16" height="14" rx="2"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="ellipse" title="Ellipse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="12" rx="8" ry="6"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="arrow" title="Arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 19L19 5"/><path d="M14 5h5v5"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="line" title="Line"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 19L19 5"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="text" title="Text"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 6h12"/><path d="M12 6v12"/><path d="M8 18h8"/></svg></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group colors">
        <button class="color-swatch active" data-color="#f97316" style="--swatch-color:#f97316"></button>
        <button class="color-swatch" data-color="#ef4444" style="--swatch-color:#ef4444"></button>
        <button class="color-swatch" data-color="#22c55e" style="--swatch-color:#22c55e"></button>
        <button class="color-swatch" data-color="#3b82f6" style="--swatch-color:#3b82f6"></button>
        <button class="color-swatch" data-color="#a855f7" style="--swatch-color:#a855f7"></button>
        <button class="color-swatch black" data-color="#111111" style="--swatch-color:#111111"></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group strokes">
        <button class="stroke-btn" data-width="2"><span class="stroke-preview" style="height:1.5px"></span></button>
        <button class="stroke-btn active" data-width="4"><span class="stroke-preview" style="height:3px"></span></button>
        <button class="stroke-btn" data-width="8"><span class="stroke-preview" style="height:5px"></span></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-crop" title="Crop image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2v4H2"/><path d="M6 6h12v12"/><path d="M18 22v-4h4"/><path d="M2 6h4v12h12"/></svg></button>
        <button class="toolbar-btn" id="btn-copy" title="Copy to clipboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 15V5h10"/></svg></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-undo" title="Undo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10h13a4 4 0 010 8H7"/><path d="M7 6L3 10l4 4"/></svg></button>
        <button class="toolbar-btn" id="btn-redo" title="Redo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10H8a4 4 0 000 8h9"/><path d="M17 6l4 4-4 4"/></svg></button>
        <button class="toolbar-btn" id="btn-clear" title="Clear canvas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>
      </div>
    </div>

    <!-- Crop overlay UI -->
    <div class="crop-overlay" id="crop-overlay">
      <div class="crop-mask" id="crop-mask"></div>
      <div class="crop-box" id="crop-box">
        <div class="crop-handle crop-handle-n" data-handle="n"></div>
        <div class="crop-handle crop-handle-s" data-handle="s"></div>
        <div class="crop-handle crop-handle-e" data-handle="e"></div>
        <div class="crop-handle crop-handle-w" data-handle="w"></div>
        <div class="crop-handle crop-handle-nw" data-handle="nw"></div>
        <div class="crop-handle crop-handle-ne" data-handle="ne"></div>
        <div class="crop-handle crop-handle-sw" data-handle="sw"></div>
        <div class="crop-handle crop-handle-se" data-handle="se"></div>
      </div>
      <div class="crop-hint" id="crop-hint"><kbd>Enter</kbd> to crop &middot; <kbd>Esc</kbd> to cancel</div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
      </div>
      <h2>No image loaded</h2>
      <p>Capture your screen or open an image to begin</p>
      <div class="empty-actions">
        <button class="btn btn-primary" id="empty-capture"><span class="camera-dot"></span>Capture screen</button>
        <button class="btn btn-secondary" id="empty-open">Open image</button>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="text-input-wrapper" id="text-input-wrapper">
      <textarea id="inline-text-input" placeholder="Type here..."></textarea>
    </div>
  </div>

  <div class="statusbar">
    <span class="status-tool" id="status-tool">Rectangle</span>
    <div class="statusbar-spacer"></div>
    <span class="zoom-level" id="status-zoom">100%</span>
  </div>

  <div class="context-menu" id="context-menu">
    <button class="context-menu-item" id="ctx-window-container">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="M3 9h18"/><circle cx="6.5" cy="6.5" r="1" fill="#ff5f57" stroke="none"/><circle cx="9.5" cy="6.5" r="1" fill="#febc2e" stroke="none"/><circle cx="12.5" cy="6.5" r="1" fill="#28c840" stroke="none"/></svg>
      <span>Window container</span>
      <span class="ctx-shortcut">W</span>
    </button>
    <div class="context-menu-separator"></div>
    <div class="context-menu-label">Background</div>
    <div class="context-menu-gradients" id="ctx-gradients">
      <button class="gradient-swatch" data-gradient="none" title="None (dark)"><span style="background:#09090b"></span></button>
      <button class="gradient-swatch" data-gradient="sunset" title="Sunset"><span style="background:linear-gradient(135deg,#f97316,#ec4899)"></span></button>
      <button class="gradient-swatch" data-gradient="ocean" title="Ocean"><span style="background:linear-gradient(135deg,#06b6d4,#3b82f6)"></span></button>
      <button class="gradient-swatch" data-gradient="forest" title="Forest"><span style="background:linear-gradient(135deg,#22c55e,#14b8a6)"></span></button>
      <button class="gradient-swatch" data-gradient="purple" title="Purple"><span style="background:linear-gradient(135deg,#8b5cf6,#ec4899)"></span></button>
      <button class="gradient-swatch" data-gradient="midnight" title="Midnight"><span style="background:linear-gradient(135deg,#1e1b4b,#312e81)"></span></button>
      <button class="gradient-swatch" data-gradient="warm" title="Warm"><span style="background:linear-gradient(135deg,#fbbf24,#f97316)"></span></button>
    </div>
    <div class="context-menu-separator"></div>
    <button class="context-menu-item" id="ctx-copy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 15V5h10"/></svg>
      <span>Copy to clipboard</span>
      <span class="ctx-shortcut">Ctrl+C</span>
    </button>
    <button class="context-menu-item" id="ctx-save-png">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/></svg>
      <span>Save as PNG</span>
      <span class="ctx-shortcut">Ctrl+E</span>
    </button>
  </div>



  <div class="export-progress" id="export-progress" aria-live="polite" aria-hidden="true">
    <div class="export-progress-track"><div class="export-progress-fill" id="export-progress-fill"></div></div>
    <div class="export-progress-label" id="export-progress-label">Preparing export…</div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
