<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
      }
      .toast {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 14px;
        background: rgba(30,32,36,0.82);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        color: rgba(255,255,255,0.92);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.4;
        letter-spacing: 0.01em;
        display: flex;
        align-items: center;
        gap: 8px;
        animation: toastSlideIn .25s ease;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      .toast::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .toast-info::before  { background: #5a9cf5; }
      .toast-success::before { background: #34c759; }
      .toast-error::before   { background: #ff453a; }
      @keyframes toastSlideIn {
        from { opacity: 0; transform: translateY(8px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast"></div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const message = params.get('message') || '';
      const type = params.get('type') || 'info';
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('toast-' + type);
    </script>
  </body>
</html>
