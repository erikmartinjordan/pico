<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
<style>
  .about-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 46px 34px 28px;
    -webkit-app-region: drag;
  }
  .about-container img,
  .about-container .name,
  .update-actions,
  .update-progress {
    -webkit-app-region: no-drag;
  }
  .about-container img {
    display: block;
    width: 96px;
    height: 96px;
    margin-bottom: 16px;
    filter: drop-shadow(0 8px 16px rgba(82, 52, 28, 0.18));
  }
  .about-container .name {
    font-size: 17px;
    font-weight: 760;
    letter-spacing: 0;
    margin-bottom: 2px;
  }
  .about-container .version {
    font-size: 12px;
    color: rgba(60, 60, 67, 0.62);
    font-weight: 500;
  }
  .about-container .desc {
    font-size: 11px;
    color: rgba(60, 60, 67, 0.62);
    margin-top: 14px;
    text-align: center;
    line-height: 1.45;
    max-width: 260px;
  }
  .update-panel {
    width: 100%;
    max-width: 286px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(60, 60, 67, 0.14);
    text-align: center;
  }
  .update-status {
    min-height: 32px;
    color: rgba(60, 60, 67, 0.62);
    font-size: 11px;
    line-height: 1.45;
  }
  .update-status.error { color: #c41e1e; }
  .update-status.success { color: #1e8a3e; }
  .update-actions {
    display: flex;
    justify-content: center;
    gap: 7px;
    margin-top: 10px;
  }
  .update-actions button {
    min-width: 72px;
    height: 25px;
    border: 1px solid rgba(60, 60, 67, 0.22);
    border-radius: 5px;
    padding: 0 10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.68), rgba(255,255,255,0.42));
    color: #1d1d1f;
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 0.5px 0 rgba(255,255,255,0.72) inset, 0 0.5px 0.5px rgba(0,0,0,0.04);
  }
  .update-actions button.secondary {
    color: rgba(60, 60, 67, 0.72);
    background: linear-gradient(180deg, rgba(255,255,255,0.50), rgba(255,255,255,0.26));
  }
  .update-actions button:disabled {
    cursor: default;
    opacity: 0.58;
  }
  .update-progress {
    position: relative;
    height: 18px;
    overflow: hidden;
    margin-top: 9px;
    border-radius: 5px;
    border: 1px solid rgba(60, 60, 67, 0.14);
    background: rgba(255, 255, 255, 0.28);
  }
  .update-progress::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: var(--update-progress, 0%);
    background: linear-gradient(90deg, rgba(249, 115, 22, 0.78), rgba(251, 146, 60, 0.88));
    transition: width 0.18s ease;
  }
  .update-progress span {
    position: relative;
    z-index: 1;
    display: block;
    padding: 0 6px;
    color: #1d1d1f;
    font-size: 11px;
    font-weight: 600;
    line-height: 16px;
    text-align: right;
  }
  @media (prefers-color-scheme: dark) {
    .about-container .name { color: #f0ede8; }
    .about-container .version,
    .about-container .desc { color: rgba(220, 215, 210, 0.62); }
    .update-panel { border-top-color: rgba(255,255,255,0.12); }
    .update-status { color: rgba(220, 215, 210, 0.62); }
    .update-status.error { color: #fca5a5; }
    .update-status.success { color: #86efac; }
    .update-actions button {
      border-color: rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.08));
      color: #f0ede8;
      box-shadow: 0 0.5px 0 rgba(255,255,255,0.08) inset, 0 0.5px 0.5px rgba(0,0,0,0.18);
    }
    .update-actions button.secondary {
      color: rgba(220,215,210,0.60);
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
    }
    .update-progress {
      border-color: rgba(255,255,255,0.12);
      background: rgba(40,42,48,0.60);
    }
    .update-progress span { color: #f0ede8; }
  }
</style>
</head>
<body class="preferences-window">
  <div class="about-container">
    <img id="icon" alt="Orange Fuji icon">
    <div class="name">Orange Fuji</div>
    <div class="version" id="version"></div>
    <div class="desc" id="desc"></div>
    <div class="update-panel" aria-label="Updates">
      <div class="update-status" id="update-status">Checking update status...</div>
      <div class="update-actions">
        <button type="button" id="update-app" hidden>Update</button>
      </div>
      <div class="update-progress" id="update-progress" hidden><span></span></div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('version').textContent = 'Version ' + (params.get('version') || '');
    document.getElementById('desc').textContent = params.get('description') || '';
    const { ipcRenderer } = require('electron');
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') ipcRenderer.send('close-about');
    });

    const updateStatus = document.getElementById('update-status');
    const updateApp = document.getElementById('update-app');
    const updateProgress = document.getElementById('update-progress');

    function setUpdateMessage(message = '', type = '') {
      updateStatus.textContent = message;
      updateStatus.classList.toggle('error', type === 'error');
      updateStatus.classList.toggle('success', type === 'success');
    }

    function renderUpdateState(state = {}) {
      const status = state.status || 'idle';
      const supported = state.supported !== false;
      const busy = status === 'checking' || status === 'downloading' || status === 'installing';
      const canDownload = supported && status === 'available';
      const canInstall = supported && status === 'downloaded';
      const message = state.error || state.message || 'Up to date';

      setUpdateMessage(message, status === 'error' ? 'error' : (status === 'downloaded' || status === 'idle' ? 'success' : ''));
      updateApp.hidden = !canDownload && status !== 'downloading' && !canInstall;
      updateApp.disabled = busy;
      updateApp.textContent = status === 'downloading' ? 'Downloading...' : (canInstall ? 'Restart' : 'Update');
      updateApp.dataset.action = canInstall ? 'install' : 'download';

      const percent = Number(state.progress?.percent);
      const hasProgress = status === 'downloading' && Number.isFinite(percent);
      updateProgress.hidden = !hasProgress;
      updateProgress.style.setProperty('--update-progress', hasProgress ? `${Math.max(0, Math.min(100, percent))}%` : '0%');
      updateProgress.querySelector('span').textContent = hasProgress ? `${Math.round(percent)}%` : '';
    }

    async function invokeUpdate(channel, fallbackState) {
      renderUpdateState(fallbackState);
      try {
        renderUpdateState(await ipcRenderer.invoke(channel));
      } catch (error) {
        setUpdateMessage(error?.message || 'Update action failed.', 'error');
      }
    }

    ipcRenderer.on('app-update-state', (_, state) => renderUpdateState(state));
    ipcRenderer.invoke('get-app-update-state').then((state) => {
      renderUpdateState(state);
      if (state?.supported !== false && (state?.status === 'idle' || !state?.status)) {
        invokeUpdate('check-for-app-updates', { status: 'checking', supported: true, message: 'Checking...' });
      }
    }).catch((error) => {
      setUpdateMessage(error?.message || '', 'error');
    });
    updateApp.addEventListener('click', () => {
      if (updateApp.dataset.action === 'install') {
        invokeUpdate('install-app-update', { status: 'installing', supported: true, message: 'Installing...' });
      } else {
        invokeUpdate('download-app-update', { status: 'downloading', supported: true, message: 'Downloading...', progress: { percent: 0 } });
      }
    });
  </script>
</body>
</html>
