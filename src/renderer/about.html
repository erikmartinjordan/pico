<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
<style>
  .about-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 34px 34px;
    -webkit-app-region: drag;
  }
  .about-container img,
  .about-container .name {
    -webkit-app-region: no-drag;
  }
  .about-container img {
    display: block;
    width: 96px;
    height: 96px;
    margin-bottom: 16px;
    filter: drop-shadow(0 8px 16px rgba(82, 52, 28, 0.18));
  }
  .about-container .name {
    font-size: 17px;
    font-weight: 760;
    letter-spacing: 0;
    margin-bottom: 2px;
  }
  .about-container .version {
    font-size: 12px;
    color: rgba(60, 60, 67, 0.62);
    font-weight: 500;
  }
  .about-container .desc {
    font-size: 11px;
    color: rgba(60, 60, 67, 0.62);
    margin-top: 14px;
    text-align: center;
    line-height: 1.45;
    max-width: 260px;
  }
  @media (prefers-color-scheme: dark) {
    .about-container .name { color: #f0ede8; }
    .about-container .version,
    .about-container .desc { color: rgba(220, 215, 210, 0.62); }
  }
</style>
</head>
<body class="preferences-window">
  <div class="about-container">
    <img id="icon" alt="Orange Fuji icon">
    <div class="name">Orange Fuji</div>
    <div class="version" id="version"></div>
    <div class="desc" id="desc"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('version').textContent = 'Version ' + (params.get('version') || '');
    document.getElementById('desc').textContent = params.get('description') || '';
    const { ipcRenderer } = require('electron');
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') ipcRenderer.send('close-about');
    });
  </script>
</body>
</html>
