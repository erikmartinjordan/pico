<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
      }
      .toast {
        width: 224px;
        height: 164px;
        padding: 8px;
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 14px;
        background: rgba(8,10,14,0.78);
        backdrop-filter: blur(16px);
        color: rgba(255,255,255,0.92);
        cursor: pointer;
        box-shadow: none;
        outline: none;
        transition: transform 0.15s ease, background 0.15s ease;
      }
      .toast:not(.ready) {
        visibility: hidden;
      }
      .toast:hover { transform: scale(1.025); background: rgba(18,20,24,0.9); }
      .toast:focus,
      .toast:focus-visible {
        outline: none;
        box-shadow: none;
      }
      img {
        display: block;
        width: 100%;
        height: 120px;
        object-fit: contain;
        border-radius: 9px;
        background: rgba(255,255,255,0.06);
        box-shadow: none;
        opacity: 0;
        transition: opacity 0.08s ease;
      }
      .toast.ready img {
        opacity: 1;
      }
      .label {
        margin-top: 7px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        color: rgba(255,255,255,0.86);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.01em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast" role="button" tabindex="0" aria-label="Open capture preview">
      <img id="preview" alt="Capture preview">
      <div class="label" id="label">Click to edit capture</div>
    </div>
    <script>
      const { ipcRenderer } = require('electron');
      const params = new URLSearchParams(window.location.search);
      const captureMode = params.get('captureMode') || 'region';
      const toast = document.getElementById('toast');
      const preview = document.getElementById('preview');
      const label = document.getElementById('label');
      label.textContent = `Click to edit ${captureMode} capture`;

      function showReadyToast() {
        toast.classList.add('ready');
      }

      function setPreviewSource(dataUrl) {
        if (!dataUrl) {
          showReadyToast();
          return;
        }
        preview.addEventListener('load', showReadyToast, { once: true });
        preview.addEventListener('error', showReadyToast, { once: true });
        preview.src = dataUrl;
        if (preview.complete && preview.naturalWidth > 0) showReadyToast();
      }

      ipcRenderer.invoke('preview-toast-data').then((payload) => {
        setPreviewSource(payload?.dataUrl);
        if (payload?.captureMode) label.textContent = `Click to edit ${payload.captureMode} capture`;
      }).catch(showReadyToast);

      function playCaptureChime() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const ctx = new AudioContextClass();
        const now = ctx.currentTime;
        [659.25, 783.99, 1046.5].forEach((frequency, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(frequency, now);
          gain.gain.setValueAtTime(0.0001, now);
          const start = now + index * 0.08;
          const end = start + 0.23;
          gain.gain.exponentialRampToValueAtTime(0.08, start + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.0001, end);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(end);
        });
        setTimeout(() => ctx.close().catch(() => {}), 700);
      }

      const openPreview = () => ipcRenderer.send('preview-toast-clicked');
      toast.addEventListener('click', openPreview);
      toast.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openPreview();
        }
      });
      window.addEventListener('DOMContentLoaded', playCaptureChime);
    </script>
  </body>
</html>
