<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: default;
    }
    
    body.region-mode {
      cursor: crosshair;
    }
    
    #overlay {
      position: fixed;
      inset: 0;
      transition: opacity 0.2s ease;
    }

    #overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    
    #selection {
      position: absolute;
      outline: 2px solid #f07d20;
      outline-offset: 0;
      background: transparent;
      pointer-events: none;
      display: none;
    }
    
    #selection.visible {
      display: block;
    }
    
    #selection::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: rgba(240, 125, 32, 0.08);
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        0 100%,
        0 0,
        2px 2px,
        2px calc(100% - 2px),
        calc(100% - 2px) calc(100% - 2px),
        calc(100% - 2px) 2px,
        2px 2px
      );
    }
    
    #dimensions {
      position: absolute;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      pointer-events: none;
      display: none;
    }
    
    #dimensions.visible {
      display: block;
    }

    #window-highlight {
      position: absolute;
      border: 2px solid #f07d20;
      background: rgba(240, 125, 32, 0.06);
      pointer-events: none;
      display: none;
      border-radius: var(--window-highlight-radius, 8px);
      outline: 1px solid rgba(0, 0, 0, 0.45);
      box-shadow:
        0 0 0 1px rgba(240, 125, 32, 0.38),
        0 0 14px rgba(240, 125, 32, 0.58),
        0 0 28px rgba(240, 125, 32, 0.22);
      transition: top 0.08s ease-out, left 0.08s ease-out, width 0.08s ease-out, height 0.08s ease-out;
    }

    #window-highlight.visible {
      display: block;
    }

    #window-label {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: #f07d20;
      padding: 5px 12px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 500;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(240, 125, 32, 0.5);
    }

    #window-label.visible {
      display: block;
    }
    
    #instructions {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      transition: opacity 0.3s ease;
    }
    
    #instructions.hidden {
      display: none;
    }

    #instructions kbd {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
    }

    /* Isolated capture result view */
    #capture-result {
      position: fixed;
      inset: 0;
      background: #1a1a1c;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 100;
    }

    #capture-result.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #capture-result img {
      max-width: 85vw;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6),
                  0 0 0 1px rgba(255, 255, 255, 0.06);
      transform: scale(0.92);
      opacity: 0.5;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
    }

    #capture-result.visible img {
      transform: scale(1);
      opacity: 1;
    }

    #loupe {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.35);
      box-shadow: 0 4px 24px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.3);
      overflow: hidden;
      /* Size: loupe canvas is 120x80, same as element */
      width: 120px;
      height: 80px;
    }

    #loupe-coords {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      display: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 0 0 7px 7px;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <canvas id="canvas"></canvas>
    <div id="selection"></div>
    <div id="dimensions"></div>
    <div id="window-highlight"></div>
    <div id="window-label"></div>
    <div id="instructions" class="hidden"></div>
  </div>
  <div id="capture-result"></div>
  <canvas id="loupe" width="240" height="160"></canvas><!-- 2x retina -->
  <div id="loupe-coords"></div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const selection = document.getElementById('selection');
    const dimensions = document.getElementById('dimensions');
    const windowHighlight = document.getElementById('window-highlight');
    const windowLabel = document.getElementById('window-label');
    const loupeCanvas = document.getElementById('loupe');
    const loupeCtx = loupeCanvas.getContext('2d');
    const loupeCoords = document.getElementById('loupe-coords');
    const LOUPE_W = 120;   // CSS px (canvas is 2x: 240x160)
    const LOUPE_H = 80;
    const LOUPE_ZOOM = 4;  // 4x magnification
    const LOUPE_OFFSET_X = 20;  // offset from cursor
    const LOUPE_OFFSET_Y = 20;

    // ── Selector tuning constants ────────────────────────────────────────────
    // Generous padding around detected bounds ensures the window is always
    // well-centered within the highlight, even with coordinate misalignment
    // between the screenshot and the window enumeration (DWM frame, DPI, etc.)
    const PLATFORM_HIGHLIGHT = {
      darwin: { padding: 0, xShift: 0, yShift: 0, radius: 10 },
      win32: { padding: 0, xShift: 0, yShift: 0, radius: 6 },
      default: { padding: 0, xShift: 0, yShift: 0, radius: 8 },
    };
    const HIT_TOLERANCE = 10;
    let highlightMetrics = PLATFORM_HIGHLIGHT.default;

    let captureData = null;
    let captureMode = 'region';
    let windowBounds = [];
    let screenshotCanvas = null;
    let isSelecting = false;
    let startX = 0;
    let startY = 0;
    let currentX = 0;
    let currentY = 0;
    let hoveredWindow = null;

    // Scale factors to map display-relative window bounds to viewport coordinates.
    // The screenshot is stretched to fill the viewport, so window bounds (in display coords)
    // must be scaled by (viewport / display.bounds) to align with the rendered screenshot.
    let boundsScaleX = 1;
    let boundsScaleY = 1;

    /**
     * Compute the padded, centered viewport rectangle for a given window.
     * Used by both the highlight border and the canvas clip region to ensure
     * they are perfectly aligned with each other.
     */
    function getWindowViewportRect(win) {
      // Raw viewport coordinates from display-relative bounds
      const rawX = win.x * boundsScaleX;
      const rawY = win.y * boundsScaleY;
      const rawW = win.width * boundsScaleX;
      const rawH = win.height * boundsScaleY;

      // Keep the highlight on integer viewport pixels so the orange border
      // stays visually locked to the bright unmasked screenshot region.
      const x = Math.round(rawX - highlightMetrics.padding + highlightMetrics.xShift);
      const y = Math.round(rawY - highlightMetrics.padding + highlightMetrics.yShift);
      const w = Math.round(rawW + highlightMetrics.padding * 2);
      const h = Math.round(rawH + highlightMetrics.padding * 2);

      // Clamp to viewport to avoid rendering outside visible area
      const cx = Math.max(0, x);
      const cy = Math.max(0, y);
      const cx2 = Math.min(canvas.width, x + w);
      const cy2 = Math.min(canvas.height, y + h);

      return { x: cx, y: cy, width: cx2 - cx, height: cy2 - cy };
    }

    window.pico.onCaptureData(async (data) => {
      captureData = data;
      captureMode = data.mode || 'region';
      highlightMetrics = PLATFORM_HIGHLIGHT[data.platform] || PLATFORM_HIGHLIGHT.default;
      document.documentElement.style.setProperty('--window-highlight-radius', `${highlightMetrics.radius}px`);
      windowBounds = (data.windowBounds || []).slice();

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // Compute scale from display coordinate space to viewport
      if (data.bounds) {
        boundsScaleX = window.innerWidth / data.bounds.width;
        boundsScaleY = window.innerHeight / data.bounds.height;
      }

      await drawScreenshot(data);
      repaintOverlay();

      const instructions = document.getElementById('instructions');
      if (captureMode === 'region' || captureMode === 'record-region') {
        document.body.classList.add('region-mode');
        instructions.classList.add('hidden');
        instructions.textContent = '';
      } else {
        instructions.classList.remove('hidden');
        instructions.innerHTML = windowBounds.length
          ? 'Click on a window to capture · Press <kbd>Esc</kbd> to cancel'
          : 'No window detected. Click anywhere to cancel · Press <kbd>Esc</kbd> to cancel';
      }
    });

    async function drawScreenshot(data) {
      screenshotCanvas = document.createElement('canvas');
      screenshotCanvas.width = canvas.width;
      screenshotCanvas.height = canvas.height;
      const sctx = screenshotCanvas.getContext('2d');

      if (data.type === 'multi') {
        const { screens, virtualBounds } = data;
        const scaleX = canvas.width / virtualBounds.width;
        const scaleY = canvas.height / virtualBounds.height;
        for (const screen of screens) {
          const img = await loadImage(screen.dataUrl);
          const x = (screen.bounds.x - virtualBounds.x) * scaleX;
          const y = (screen.bounds.y - virtualBounds.y) * scaleY;
          const w = screen.bounds.width * scaleX;
          const h = screen.bounds.height * scaleY;
          sctx.drawImage(img, x, y, w, h);
        }
      } else {
        const img = await loadImage(data.dataUrl);
        sctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      }
    }

    function repaintOverlay() {
      if (!screenshotCanvas) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(screenshotCanvas, 0, 0);

      if (captureMode === 'window' || captureMode === 'record-region') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (captureMode === 'record-region' && isSelecting) {
        const rect = getSelectionRect();
        if (rect.width > 0 && rect.height > 0) {
          ctx.drawImage(
            screenshotCanvas,
            Math.round(rect.x),
            Math.round(rect.y),
            Math.round(rect.width),
            Math.round(rect.height),
            Math.round(rect.x),
            Math.round(rect.y),
            Math.round(rect.width),
            Math.round(rect.height),
          );
        }
      }

      if (captureMode === 'window' && hoveredWindow) {
        // Use the same padded viewport rect for the bright clip region
        // so the unmasked area and the orange border are perfectly aligned.
        const rect = getWindowViewportRect(hoveredWindow);
        ctx.save();
        ctx.beginPath();
        // Use rounded rect matching the highlight border-radius
        roundedRect(ctx, rect.x, rect.y, rect.width, rect.height, highlightMetrics.radius);
        ctx.clip();
        ctx.drawImage(screenshotCanvas, 0, 0);
        ctx.restore();
      }
    }

    function roundedRect(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
    }

    function getSelectionRect() {
      const x = Math.min(startX, currentX);
      const y = Math.min(startY, currentY);
      const width = Math.abs(currentX - startX);
      const height = Math.abs(currentY - startY);
      return { x, y, width, height };
    }

    function updateSelectionUi() {
      const { x, y, width, height } = getSelectionRect();
      selection.style.left = `${x}px`;
      selection.style.top = `${y}px`;
      selection.style.width = `${width}px`;
      selection.style.height = `${height}px`;
      const label = captureMode === 'record-region' ? 'REC ' : '';
      dimensions.textContent = `${label}${width} \u00d7 ${height}`;
      dimensions.style.left = `${x + 6}px`;
      dimensions.style.top = `${y > 28 ? y - 24 : y + height + 6}px`;
      repaintOverlay();
    }

    function updateLoupe(mouseX, mouseY) {
      const isRegionMode = captureMode === 'region' || captureMode === 'record-region';
      if (!isRegionMode || !screenshotCanvas) {
        loupeCanvas.style.display = 'none';
        loupeCoords.style.display = 'none';
        return;
      }

      // --- Draw loupe ---
      // Source region on the screenshot canvas to magnify
      // LOUPE_W/LOUPE_ZOOM = how many screenshot pixels fit in the loupe
      const srcW = Math.round(LOUPE_W / LOUPE_ZOOM);
      const srcH = Math.round(LOUPE_H / LOUPE_ZOOM);
      const srcX = Math.round(mouseX - srcW / 2);
      const srcY = Math.round(mouseY - srcH / 2);

      // Clear and draw magnified region (canvas is 2x for retina: 240x160)
      loupeCtx.clearRect(0, 0, 240, 160);
      loupeCtx.imageSmoothingEnabled = false; // crisp pixels
      loupeCtx.drawImage(
        screenshotCanvas,
        srcX, srcY, srcW, srcH,
        0, 0, 240, 160
      );

      // Draw center crosshair lines on loupe
      loupeCtx.strokeStyle = 'rgba(255,255,255,0.7)';
      loupeCtx.lineWidth = 1;
      loupeCtx.beginPath();
      loupeCtx.moveTo(120, 0); loupeCtx.lineTo(120, 160); // vertical
      loupeCtx.moveTo(0, 80);  loupeCtx.lineTo(240, 80);  // horizontal
      loupeCtx.stroke();
      // Thin dark shadow pass for contrast
      loupeCtx.strokeStyle = 'rgba(0,0,0,0.4)';
      loupeCtx.lineWidth = 0.5;
      loupeCtx.beginPath();
      loupeCtx.moveTo(119, 0); loupeCtx.lineTo(119, 160);
      loupeCtx.moveTo(0, 79);  loupeCtx.lineTo(240, 79);
      loupeCtx.stroke();

      // --- Position loupe so it never goes off-screen ---
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      let lx = mouseX + LOUPE_OFFSET_X;
      let ly = mouseY + LOUPE_OFFSET_Y;
      // Flip left if too close to right edge
      if (lx + LOUPE_W + 4 > vw) lx = mouseX - LOUPE_W - LOUPE_OFFSET_X;
      // Flip up if too close to bottom edge
      if (ly + LOUPE_H + 20 > vh) ly = mouseY - LOUPE_H - LOUPE_OFFSET_Y - 18;

      loupeCanvas.style.left = lx + 'px';
      loupeCanvas.style.top  = ly + 'px';
      loupeCanvas.style.display = 'block';

      // --- Coords label ---
      // Convert viewport px → logical screen coordinates
      // Use captureData.bounds to map back to real screen coords
      let labelX = mouseX;
      let labelY = mouseY;
      if (captureData?.bounds) {
        labelX = Math.round(mouseX / window.innerWidth  * captureData.bounds.width  + (captureData.bounds.x || 0));
        labelY = Math.round(mouseY / window.innerHeight * captureData.bounds.height + (captureData.bounds.y || 0));
      }
      // If selecting, show width×height of current rect
      let label = `${labelX}, ${labelY}`;
      if (isSelecting) {
        const rw = Math.abs(currentX - startX);
        const rh = Math.abs(currentY - startY);
        if (captureData?.bounds) {
          const lw = Math.round(rw / window.innerWidth  * captureData.bounds.width);
          const lh = Math.round(rh / window.innerHeight * captureData.bounds.height);
          label = `${lw} × ${lh}`;
        } else {
          label = `${Math.round(rw)} × ${Math.round(rh)}`;
        }
      }
      loupeCoords.textContent = label;
      loupeCoords.style.left  = lx + 'px';
      loupeCoords.style.top   = (ly + LOUPE_H) + 'px';
      loupeCoords.style.width = LOUPE_W + 'px';
      loupeCoords.style.textAlign = 'center';
      loupeCoords.style.display = 'block';
    }

    function findWindowAt(x, y) {
      // Convert viewport coords to display-relative coords for hit testing.
      // Use generous tolerance so hovering near a window boundary triggers it.
      const dx = x / boundsScaleX;
      const dy = y / boundsScaleY;

      // First pass: find windows whose bounds (with tolerance) contain the point.
      // Prefer smaller (more specific) windows over larger ones that also contain it.
      let best = null;
      let bestArea = Infinity;
      for (const wb of windowBounds) {
        if (dx >= wb.x - HIT_TOLERANCE && dx <= wb.x + wb.width + HIT_TOLERANCE &&
            dy >= wb.y - HIT_TOLERANCE && dy <= wb.y + wb.height + HIT_TOLERANCE) {
          const area = wb.width * wb.height;
          if (area < bestArea) {
            best = wb;
            bestArea = area;
          }
        }
      }
      return best;
    }

    function updateWindowHover(win) {
      hoveredWindow = win;
      repaintOverlay();

      if (!win) {
        windowHighlight.classList.remove('visible');
        windowLabel.classList.remove('visible');
        return;
      }

      // Use the shared padded viewport rect for the highlight border
      const rect = getWindowViewportRect(win);

      windowHighlight.style.left = `${rect.x}px`;
      windowHighlight.style.top = `${rect.y}px`;
      windowHighlight.style.width = `${rect.width}px`;
      windowHighlight.style.height = `${rect.height}px`;
      windowHighlight.classList.add('visible');

      windowLabel.textContent = win.name || 'Window';
      windowLabel.style.left = `${rect.x + 6}px`;
      windowLabel.style.top = `${rect.y > 34 ? rect.y - 30 : rect.y + rect.height + 6}px`;
      windowLabel.classList.add('visible');
    }

    function cropFromScreenRect(rect) {
      if (!captureData) return null;
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;

      if (captureData.type === 'single') {
        return loadImage(captureData.dataUrl).then((img) => {
          const pixelWidth = captureData.pixelSize?.width || img.naturalWidth || img.width || viewW;
          const pixelHeight = captureData.pixelSize?.height || img.naturalHeight || img.height || viewH;
          const scaleX = pixelWidth / viewW;
          const scaleY = pixelHeight / viewH;
          const srcX = Math.round(rect.x * scaleX);
          const srcY = Math.round(rect.y * scaleY);
          const srcW = Math.round(rect.width * scaleX);
          const srcH = Math.round(rect.height * scaleY);
          const out = document.createElement('canvas');
          out.width = Math.max(1, srcW);
          out.height = Math.max(1, srcH);
          const octx = out.getContext('2d');
          octx.drawImage(
            img,
            srcX,
            srcY,
            srcW,
            srcH,
            0, 0,
            out.width,
            out.height,
          );
          return out.toDataURL('image/png');
        });
      }

      const out = document.createElement('canvas');
      const scaleFactor = captureData.maxScale || 1;
      out.width = Math.max(1, Math.round(rect.width * scaleFactor));
      out.height = Math.max(1, Math.round(rect.height * scaleFactor));
      const octx = out.getContext('2d');

      const { virtualBounds } = captureData;
      const selX = (rect.x / viewW) * virtualBounds.width;
      const selY = (rect.y / viewH) * virtualBounds.height;
      const selW = (rect.width / viewW) * virtualBounds.width;
      const selH = (rect.height / viewH) * virtualBounds.height;

      return Promise.all(captureData.screens.map((s) => loadImage(s.dataUrl))).then((images) => {
        images.forEach((img, i) => {
          const s = captureData.screens[i];
          const screenX = s.bounds.x - virtualBounds.x;
          const screenY = s.bounds.y - virtualBounds.y;
          const overlapX1 = Math.max(selX, screenX);
          const overlapY1 = Math.max(selY, screenY);
          const overlapX2 = Math.min(selX + selW, screenX + s.bounds.width);
          const overlapY2 = Math.min(selY + selH, screenY + s.bounds.height);
          if (overlapX2 <= overlapX1 || overlapY2 <= overlapY1) return;

          const sf = s.scaleFactor || 1;
          const srcX = Math.round((overlapX1 - screenX) * sf);
          const srcY = Math.round((overlapY1 - screenY) * sf);
          const srcW = Math.round((overlapX2 - overlapX1) * sf);
          const srcH = Math.round((overlapY2 - overlapY1) * sf);
          const dstX = Math.round((overlapX1 - selX) * scaleFactor);
          const dstY = Math.round((overlapY1 - selY) * scaleFactor);
          const dstW = Math.round((overlapX2 - overlapX1) * scaleFactor);
          const dstH = Math.round((overlapY2 - overlapY1) * scaleFactor);
          octx.drawImage(img, srcX, srcY, srcW, srcH, dstX, dstY, dstW, dstH);
        });
        return out.toDataURL('image/png');
      });
    }

    function cropFromOverlayRect(rect) {
      if (!screenshotCanvas) return null;
      const out = document.createElement('canvas');
      out.width = Math.max(1, Math.round(rect.width));
      out.height = Math.max(1, Math.round(rect.height));
      const octx = out.getContext('2d');
      octx.drawImage(
        screenshotCanvas,
        Math.round(rect.x),
        Math.round(rect.y),
        Math.round(rect.width),
        Math.round(rect.height),
        0,
        0,
        out.width,
        out.height,
      );
      return out.toDataURL('image/png');
    }

    document.addEventListener('mousedown', (e) => {
      if (captureMode === 'window') {
        if (hoveredWindow) {
          // Use native desktopCapturer for pixel-perfect window capture (no frame math needed).
          // Prefer exact source ids harvested from the OS window id; names are only a fallback.
          if (hoveredWindow.sourceId) {
            window.pico.selectWindowSource(hoveredWindow.sourceId);
          } else {
            window.pico.selectWindowByName(hoveredWindow.name);
          }
        }
        return;
      }
      isSelecting = true;
      startX = currentX = e.clientX;
      startY = currentY = e.clientY;
      selection.classList.add('visible');
      dimensions.classList.add('visible');
      updateSelectionUi();
      updateLoupe(e.clientX, e.clientY);
    });

    document.addEventListener('mousemove', (e) => {
      if (captureMode === 'window') {
        const win = findWindowAt(e.clientX, e.clientY);
        if (win !== hoveredWindow) updateWindowHover(win);
        updateLoupe(e.clientX, e.clientY);
        return;
      }
      if (isSelecting) {
        currentX = e.clientX;
        currentY = e.clientY;
        updateSelectionUi();
      }
      updateLoupe(e.clientX, e.clientY);
    });

    // Clear hover when mouse leaves this overlay (fixes stuck highlight on multi-monitor)
    document.addEventListener('mouseleave', () => {
      if (captureMode === 'window' && hoveredWindow) {
        updateWindowHover(null);
      }
      loupeCanvas.style.display = 'none';
      loupeCoords.style.display = 'none';
    });

    function getRecordingRegionFromRect(rect) {
      if (!captureData || captureData.type !== 'single') return null;
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      const logicalX = (rect.x / viewW) * captureData.bounds.width;
      const logicalY = (rect.y / viewH) * captureData.bounds.height;
      const logicalW = (rect.width / viewW) * captureData.bounds.width;
      const logicalH = (rect.height / viewH) * captureData.bounds.height;
      const sf = captureData.scaleFactor || 1;
      return {
        sourceId: captureData.sourceId,
        displayId: captureData.displayId,
        displayBounds: captureData.bounds,
        scaleFactor: sf,
        x: Math.round(logicalX),
        y: Math.round(logicalY),
        width: Math.round(logicalW),
        height: Math.round(logicalH),
        pixelX: Math.round(logicalX * sf),
        pixelY: Math.round(logicalY * sf),
        pixelWidth: Math.max(2, Math.round(logicalW * sf)),
        pixelHeight: Math.max(2, Math.round(logicalH * sf)),
      };
    }

    document.addEventListener('mouseup', () => {
      if (captureMode === 'window' || !isSelecting) return;
      isSelecting = false;
      loupeCanvas.style.display = 'none';
      loupeCoords.style.display = 'none';
      const rect = getSelectionRect();
      if (rect.width < 4 || rect.height < 4) return window.pico.captureCancel();
      if (captureMode === 'record-region') {
        const region = getRecordingRegionFromRect(rect);
        if (!region?.sourceId) return window.pico.captureCancel();
        return cropFromScreenRect(rect)
          .then((dataUrl) => {
            region.initialFrameDataUrl = dataUrl;
            window.pico.recordingRegionComplete(region);
          })
          .catch(() => window.pico.recordingRegionComplete(region));
      }
      cropFromScreenRect(rect).then((dataUrl) => window.pico.captureComplete(dataUrl));
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.pico.captureCancel();
    });
  </script>
</body>
</html>
