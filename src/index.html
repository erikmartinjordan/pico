<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>pico</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="titlebar" id="titlebar">
    <div class="traffic-lights"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <div class="title-meta"><span class="titlebar-title">pico</span><span class="titlebar-file">Untitled</span></div>
    <div class="titlebar-drag"></div>
  </div>

  <div class="canvas-container" id="canvas-container">
    <div class="toolbar">
      <div class="toolbar-group tools">
        <button class="toolbar-btn tool-btn active" data-tool="rect"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="5" width="16" height="14" rx="3"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="ellipse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="12" rx="8" ry="6"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 19L19 5"/><path d="M14 5h5v5"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="line"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 19L19 5"/></svg></button>
        <button class="toolbar-btn tool-btn" data-tool="text"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 6h12"/><path d="M12 6v12"/><path d="M8 18h8"/></svg></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group colors">
        <button class="color-swatch active" data-color="#ef4444" style="--swatch-color:#ef4444"></button>
        <button class="color-swatch" data-color="#f97316" style="--swatch-color:#f97316"></button>
        <button class="color-swatch" data-color="#22c55e" style="--swatch-color:#22c55e"></button>
        <button class="color-swatch" data-color="#3b82f6" style="--swatch-color:#3b82f6"></button>
        <button class="color-swatch" data-color="#a855f7" style="--swatch-color:#a855f7"></button>
        <button class="color-swatch black" data-color="#111111" style="--swatch-color:#111111"></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group strokes">
        <button class="toolbar-btn stroke-btn" data-width="2"><span class="stroke-preview" style="height:1.5px"></span></button>
        <button class="toolbar-btn stroke-btn active" data-width="4"><span class="stroke-preview" style="height:3px"></span></button>
        <button class="toolbar-btn stroke-btn" data-width="8"><span class="stroke-preview" style="height:5px"></span></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="8" width="11" height="11" rx="2"/><rect x="5" y="5" width="11" height="11" rx="2"/></svg></button>
      </div>
      <div class="toolbar-separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-undo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 7L4 12l5 5"/><path d="M20 7h-8a8 8 0 000 16"/></svg></button>
        <button class="toolbar-btn" id="btn-redo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 7l5 5-5 5"/><path d="M4 7h8a8 8 0 010 16"/></svg></button>
      </div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon"><div class="placeholder-icon"></div></div>
      <h2>No image loaded</h2>
      <p>Capture your screen or open an image to begin</p>
      <div class="empty-actions">
        <button class="btn btn-primary" id="empty-capture"><span class="camera-dot"></span>Capture screen</button>
        <button class="btn btn-secondary" id="empty-open">Open image</button>
      </div>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <div class="statusbar">
    <span class="status-tool" id="status-tool">Rectangle</span>
    <div class="statusbar-spacer"></div>
    <span class="zoom-level" id="status-zoom">100%</span>
  </div>

  <div class="modal" id="text-modal"><div class="modal-backdrop"></div><div class="modal-content"><h3>Add Text</h3><input type="text" id="text-input" placeholder="Enter text..." autofocus><div class="modal-actions"><button class="btn btn-secondary" id="text-cancel">Cancel</button><button class="btn btn-primary" id="text-confirm">Add</button></div></div></div>
  <div class="toast-container" id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
