<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>Select Window</title>
  <style>
    body{margin:0;background:rgba(0,0,0,.72);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{padding:24px}
    h1{font-size:18px;margin:0 0 12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;max-height:calc(100vh - 100px);overflow:auto}
    .card{border:1px solid rgba(255,255,255,.2);background:#111;border-radius:10px;padding:10px;cursor:pointer}
    .card:hover{border-color:#7aa2ff}
    .title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px;color:rgba(255,255,255,.9)}
    img{width:100%;height:180px;object-fit:contain;background:#000;border-radius:6px}
    .actions{margin-top:12px}
    button{background:#2b2b2b;border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Select a window to capture</h1>
    <div class="grid" id="grid"></div>
    <div class="actions"><button id="cancel">Cancel</button></div>
  </div>
  <script src="window-picker.js"></script>
</body>
</html>
