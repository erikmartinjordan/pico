name: Capture E2E Autofix

on:
  workflow_run:
    workflows: [Capture E2E]
    types: [completed]

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: capture-e2e-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  autofix:
    name: Auto-fix failed capture E2E
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.pull_requests[0].head.repo.full_name == github.repository &&
        !contains(github.event.workflow_run.head_commit.message, '[skip-autofix]') &&
        vars.CAPTURE_E2E_AUTOFIX == 'true'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout failing PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Codex CLI
        run: npm install --global @openai/codex

      - name: Run capture tests with automatic fixer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PICO_FIX_AGENT_COMMAND: codex exec --full-auto --model gpt-5.2-codex
        run: xvfb-run -a npm run test:capture:agent

      - name: Commit and push auto-fix
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-fix capture E2E failures [skip-autofix]"
          git push
