name: Capture E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  capture-e2e:
    name: Capture E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run capture E2E tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:capture

      - name: Run capture E2E tests
        if: runner.os != 'Linux'
        run: npm run test:capture

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
