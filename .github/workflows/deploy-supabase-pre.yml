name: Deploy Supabase PRE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: xnppcugncigaiycrvmpk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: supabase db push --yes

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy stripe-webhook --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy activate-license --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy validate-license --project-ref "$SUPABASE_PROJECT_REF"
