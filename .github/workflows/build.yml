name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: ignore

  # ── Auto-release on every push to main ───────────────────────────────
  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect binaries into flat folder
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" \) -exec cp {} release/ \;
          echo "=== Files to release ==="
          ls -lh release/

      - name: Delete previous latest release
        run: gh release delete latest --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          gh release create latest release/* \
            --title "pico (latest)" \
            --notes "🚀 **Latest build** from \`main\` — updated automatically on every push.

          Built from [\`${GITHUB_SHA::7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) on $(date -u '+%Y-%m-%d %H:%M UTC').

          **Download:**
          - **macOS** — \`.dmg\` (Universal: Intel + Apple Silicon)
          - **Windows** — \`.exe\` (Portable, no install needed)" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Versioned release (push a tag like v2.1.0) ──────────────────────
  release-versioned:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" \) -exec cp {} release/ \;

      - name: Create versioned release
        run: |
          gh release create ${{ github.ref_name }} release/* \
            --title "pico ${{ github.ref_name }}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
