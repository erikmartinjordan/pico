<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pico mockup</title>
    <style>
      :root {
        --window-bg: #1a1a1a;
        --title-bg: #1a1a1a;
        --toolbar-bg: #111;
        --canvas-bg: #0d0d0d;
        --status-bg: #111;
        --border: #232323;
        --border-subtle: #1c1c1c;
        --text: #f5f5f5;
        --text-muted: #868686;
        --text-dim: #6f6f6f;
        --active: #4a90e2;
        --tool-hover: #202020;
        --tool-bg: #181818;
        --checker-a: #111111;
        --checker-b: #171717;
        --btn-blue: #3f86dc;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #090909;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "DM Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--text);
      }

      .window {
        width: 1400px;
        height: 830px;
        background: var(--window-bg);
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.45);
        display: flex;
        flex-direction: column;
      }

      .titlebar {
        height: 40px;
        background: var(--title-bg);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
      }
      .title-left, .title-right { display: flex; align-items: center; gap: 10px; }
      .logo {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        background: linear-gradient(145deg, #7fd3ff, #3e8ee8);
      }
      .title-label { font-size: 13px; color: #d6d6d6; letter-spacing: 0.01em; }
      .window-btn {
        width: 12px; height: 12px; border-radius: 50%;
        background: #2d2d2d; border: 1px solid #3b3b3b;
      }

      .toolbar {
        height: 50px;
        background: var(--toolbar-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 8px;
      }
      .tool-group { display: flex; align-items: center; gap: 6px; }
      .spacer { flex: 1; }
      .divider { width: 1px; height: 28px; background: #232323; margin: 0 2px; }
      .tool {
        width: 32px;
        height: 32px;
        border: 1px solid #2a2a2a;
        border-radius: 7px;
        background: var(--tool-bg);
        display: grid;
        place-items: center;
        color: #b7b7b7;
        cursor: pointer;
      }
      .tool:hover { filter: brightness(1.2); }
      .tool.active { border-color: var(--active); background: #1f2630; }

      .swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; }
      .swatch:hover { filter: brightness(1.2); }

      .stroke { width: 36px; height: 24px; border-radius: 5px; border: 1px solid transparent; display: grid; place-items: center; cursor: pointer; }
      .stroke:hover { background: #1b1b1b; }
      .stroke.active { border-color: #3b3b3b; background: #1c1c1c; }
      .line-thin { width: 22px; height: 1px; background: #bdbdbd; }
      .line-med { width: 22px; height: 2px; background: #bdbdbd; }
      .line-thick { width: 22px; height: 4px; background: #bdbdbd; }

      .canvas {
        flex: 1;
        background-color: var(--canvas-bg);
        background-image:
          linear-gradient(45deg, var(--checker-a) 25%, transparent 25%),
          linear-gradient(-45deg, var(--checker-a) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, var(--checker-b) 75%),
          linear-gradient(-45deg, transparent 75%, var(--checker-b) 75%);
        background-size: 12px 12px;
        background-position: 0 0, 0 6px, 6px -6px, -6px 0;
        display: grid;
        place-items: center;
      }

      .empty { text-align: center; }
      .empty-icon {
        width: 30px;
        height: 30px;
        margin: 0 auto 14px;
        border-radius: 50%;
        border: 2px solid #3b3b3b;
        opacity: 0.45;
      }
      .empty h1 { margin: 0; font-size: 24px; font-weight: 700; color: #f2f2f2; }
      .empty p { margin: 12px 0 22px; font-size: 13px; color: var(--text-muted); }
      .actions { display: flex; justify-content: center; gap: 10px; }
      .cta {
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }
      .cta:hover { filter: brightness(1.2); }
      .cta-primary { background: var(--btn-blue); border: 1px solid #4b92e7; color: white; }
      .cta-ghost { background: transparent; border: 1px solid #3a3a3a; color: #d1d1d1; }

      .status {
        height: 30px;
        background: var(--status-bg);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        font-size: 12px;
        color: var(--text-dim);
      }
      .status-left { display: flex; gap: 12px; }
      .status-right { display: flex; gap: 16px; }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <div class="title-left"><div class="logo"></div><div class="title-label">pico</div></div>
        <div class="title-right"><div class="window-btn"></div><div class="window-btn"></div><div class="window-btn"></div></div>
      </div>

      <div class="toolbar">
        <div class="tool-group">
          <button class="tool">☼</button><button class="tool">⭱</button><button class="tool">⭳</button><button class="tool">⧉</button>
          <button class="tool active">▭</button><button class="tool">◯</button><button class="tool">➜</button><button class="tool">╱</button><button class="tool">T</button>
        </div>
        <div class="divider"></div>
        <div class="tool-group">
          <div class="swatch" style="background:#ef4444"></div><div class="swatch" style="background:#f97316"></div><div class="swatch" style="background:#22c55e"></div><div class="swatch" style="background:#3b82f6"></div><div class="swatch" style="background:#8b5cf6"></div><div class="swatch" style="background:#000"></div>
        </div>
        <div class="divider"></div>
        <div class="tool-group">
          <div class="stroke"><div class="line-thin"></div></div><div class="stroke active"><div class="line-med"></div></div><div class="stroke"><div class="line-thick"></div></div>
        </div>
        <div class="spacer"></div>
        <div class="tool-group"><button class="tool">↶</button><button class="tool">↷</button></div>
      </div>

      <div class="canvas">
        <div class="empty">
          <div class="empty-icon"></div>
          <h1>No image loaded</h1>
          <p>Capture your screen or open an image to begin</p>
          <div class="actions">
            <button class="cta cta-primary">✦ Capture Screen</button>
            <button class="cta cta-ghost">▣ Open Image</button>
          </div>
        </div>
      </div>

      <div class="status">
        <div class="status-left"><span>Rectangle</span><span>0 annotations</span></div>
        <div class="status-right"><span>100%</span></div>
      </div>
    </div>
  </body>
</html>
